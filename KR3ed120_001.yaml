body:
  text: 卷上內症門呂祖師鐵拐杖方天門冬去心一斤熟地炒一斤白茯苓去皮一斤乳拌上藥共為細末煉蜜為丸彈子大每服三丸黃酒送下此藥能除消百病能令顏如童子遠行不飢鬚髮不白身體不倦無比山藥丸治諸虛百損五勞七傷肌體消瘦目暗耳鳴四肢倦怠常服壯筋骨益腎水赤石脂煅醋淬七次研細水飛一兩茯神去皮木水飛去筋一兩山萸肉去核二兩熟地黃咀片曬乾二兩巴戟去心酒洗焙乾一兩牛膝肥大者去蘆酒浸曬二兩澤瀉鹽水拌炒一兩杜仲去皮鹽水拌炒斷絲三兩山藥微炒三兩菟絲子酒煮極爛搗焙為末三兩五味子一兩肉蓯蓉酒浸焙乾四兩以上共為細末煉蜜為丸如梧子大每服五六十丸空心秋石湯送下或白滾湯送下亦可萆薢湯治腎氣素虛腰胯腿足痠軟無力腎受風濕侵襲寒冷凝滯血脈屈伸抽縮不遂麻木疼痛等症川萆薢二錢川牛膝二錢漢防己二錢於白朮土炒三錢海桐皮二錢當歸身酒洗三錢大生地三錢白芍藥酒炒二錢川杜仲炒斷絲二錢川續斷酒浸烘二錢宣木瓜一錢五分川獨活一錢五分威靈仙一錢五分臺烏藥一錢五分滴乳香制淨油一錢五分淨沒藥制淨油一錢五分茅蒼朮米泔浸一錢五分青黃風一錢五分川芎一錢五分生甘草五分不用引水煎空心服此藥益腎活血榮筋驅風去濕定痛宣通經絡藥品不雜如無海桐皮用牛蒡子亦可還童酒方久飲能添精補髓強壯筋骨驅風活經絡大補氣血如加蘄蛇虎骨更妙熟地三兩生地四兩全當歸四兩川萆薢二兩羌活一兩獨活一兩淮牛膝二兩秦艽三兩蒼朮二兩塊廣皮二兩川斷二兩麥冬三兩枸杞二兩川桂皮五錢小茴香一兩烏藥一兩丹皮二兩宣木瓜二兩五加皮四兩上藥十九味絹袋盛貯用陳酒五十斤好燒酒亦可湯煮三炷香埋土中七日早晚飲三五杯久患咳嗽連嗽四五十聲生薑汁半合蜜一匙煎熱溫服輕者四五服重者十數服立止老人喘嗽胡桃肉去皮杏仁去皮尖生薑各一兩研膏入煉蜜少許丸如彈子大每臥時嚼一丸薑湯下氣促難臥服此立定三子養親湯治老人痰喘咳嗽氣急胸滿極能調和胸胃紫蘇子蘿蔔子白芥子等分曬乾紙上微炒研細煮湯隨飲食啜下十子丸四明沈嘉則無子七十外服之連舉子槐角子和何首烏蒸七次覆盆子枸杞子去枯者及蒂桑椹子冬青子四味共蒸各四兩菟絲子制去殼酒蒸柏子仁酒浸蒸蛇床子蒸沒石子北五味子蒸枯者打碎蜜蒸以上各二兩上為末煉蜜丸如桐子大每服五六十丸空心淡鹽湯下乾點心壓之種子奇方凡夢遺滑瀉真精虧損者服之神驗有火者相宜沙苑蒺藜八兩微焙四兩為末入藥四兩為膏入蜜川續斷酒蒸二兩菟絲子三兩酒煮見絲山茱萸肉生用芡實粉生用蓮鬚生用各四兩覆盆子生用甘枸杞子各二兩前末以蒺藜膏同煉蜜和丸如梧桐子大每服四五錢空腹淡鹽湯下壯陽種子丸治尺脈微弱而痿虛寒無火者宜此熟地酒煮搗爛枸杞子各一兩半牛膝俱酒洗遠志肉甘草湯煮淮山藥山茱萸肉巴戟去骨酒蒸白茯苓五味子石菖蒲楮實子肉蓯蓉酒洗去鱗甲去心中白膜杜仲鹽酒炒茴香鹽水炒各一兩冬加肉桂五錢童便拌曬三次上為末煉蜜和棗肉為丸空心溫酒淡鹽湯任下蛔厥心疼烏梅二個川椒十四粒煎湯服即愈一切心痛不拘大小男女馬兜鈴一個燒存性為末溫酒服立效急心氣疼胡桃一個棗子一枚去核夾桃紙裹煨熟以生薑湯一鍾細嚼送下永久不發卒急心疼棗丸詩云一個烏梅二個棗七個杏仁一處搗男酒女醋送下之不害心疼直到老擦牙烏須不老神方遼細辛六錢熟地黃曬乾白蒺藜去刺破故紙五味子曬乾沒石子黑黃者佳地骨皮去粗皮旱蓮草枸杞子曬乾青鹽用草紙灑濕透包放炭中微火煨以上各一兩五錢共為末篩細瓷罐收貯不可出氣每日清晨人之元氣統聚於口切毋漱水吐出以指蘸藥末擦牙上下周遍滾水含漱徐徐咽下總不間斷固齒烏須功效如神齒衄五倍子燒研擦牙治牙疼神效方雄黃精明礬各三分牙硝一錢真大冰片一分共為極細末以半分擦患處流涎即愈極驗無比治風火牙疼松木節一小片咬疼牙上立止熏蟲牙痛方韭菜子一大撮入爐內燒燃先將蘆管一頭紙黏喇叭樣吸此煙至牙痛處其蟲俱出溫茶漱去牙痛噙藥方不論風火蟲牙皆治生草烏雄黃胡椒麝香蟾酥各等分共為細末用紬絹包噙疼牙上立止疼又治蠍蛇傷以鹽水調塗藥到痛止走馬牙疳大徽棗一枚青布包簽住蘸芝麻油於燈頭上燒之瓷鍾接承滴下油汁以棗枯油黑為度先以米泔水漱淨口再雞翎蘸油刷患處牙齦腫痛瓦松白礬等分水煎漱之立效牙齦臭爛方芥菜根燒存性研末頻敷之即愈牙宣露痛方絲瓜藤陰乾火煅存性研搽即止洗遠年雙目不明方黑豆一百粒黃菊花五朵皮硝六錢水一鍾煎七分帶熱熏洗五日換藥再洗五十日可以復明治兩眼夜不見物羯羊肝一副不見水不沾鐵器以竹刀切開加穀精草細末入瓦罐內煮熟不時服之屢驗治雀姑眼神效方石決明即海巴有窟的有眼的火煅為末三錢用豬膽一個或羊膽雞膽亦可用竹刀剖破將石決明子入內麵包燒熟滾白水送下服一個即愈目中生翳鵝不食草㗜鼻塞耳貼目去翳神藥也小兒青盲眼木賊草白蒺藜各等分末炒豬肝食目睛垂出至鼻或時大便血痛名曰肝脹羌活煎汁服數盞點胬肉攀睛方蛤粉滾水飛過乳香去油洗蕤仁冰片一分麝香一分輕粉各一錢水飛過共研極細末以新筆尖蘸涼水點之飛絲入目白菜揉爛帕包滴汁二三點入目即出洗風爛眼神效方白礬銅緑花椒各等分外加槐樹條六寸水煎涼洗專治風火眼紅方爐甘石煅為極細末用菜油調勻鍾內將鍾覆於艾火上熏至黃色為度臨睡調擦於眼上次日用溫水洗淨其藥入眼無礙治鼻淵即腦漏神效方漆綿一兩漆鋪內灑漆用過之一個絲綿也白鴿子羽去硬管用兩邊毛一兩將鴿翎捲入綿內燒灰存性每灰一錢加真冰片七釐令患者仰臥輕輕吹入少許不可重吹恐噴嚏打出無用也夜吹一次連吹四五夜即愈要戒房事百日神效無比鼻淵即腦漏因風寒凝人腦戶與太陽濕熱交蒸乃成其患鼻流清涕或流黃水點點滴滴長濕無干白芷一兩蒼耳子炒辛夷仁各二錢五分薄荷五錢為末蔥泡茶湯清調食後服以鵝兒不食草塞鼻孔自止鼻衄久不止大蒜搗如泥左鼻若出血左腳心下塗右鼻若出血右腳心下敷兩鼻俱出血兩腳心下鋪甚妙治鼻衄生地炒山梔仁各五錢水煎服即愈或用發余灰吹鼻內更妙鼻血不止白芨末唾津塗調山根便止山根即鼻梁上也鼻筍奇病用白礬硼砂少許為末吹鼻化水愈耳中出血龍骨末吹入即愈耳鳴耳癢流水風聲生烏頭一個乘濕削如棗核大塞耳早塞夜易過三五日便愈不然久則成聾耳猝聾閉方萆麻子一百粒大棗十五枚去核共搗爛入男胎乳汁和成作錠如棗核樣以絲綿裹一枚塞之覺耳中熱為度一日一換二十日瘥聤耳出汗韭汁日滴三次舌猝腫如豬胞狀滿口不治須臾死千金方用百草霜和酒塗舌下立愈要鄉間燒雜草者舌忽發脹滿口不能出聲蒲黃頻滲如因寒得加乾薑末等分舌忽脹出口外俗曰蜈蚣毒雄雞冠上血一小盞浸之即收舌硬出血木賊水煎漱口即愈紫袍散治咽喉十八種症方石青青黛硃砂白硼砂各一兩膽礬人中白煅元明粉各五錢真冰片三分山豆根二錢共為末入罐塞口急時用二三釐吹咽喉即愈神效無比纏喉風祕方常熟趙氏祖傳纏喉風藥甚效而方極祕昔一日趙氏子與友章某飲詢其方不答酒次趙喉間忽痛不可忍乃大聲曰為求豬牙皂角來來則細搗以酸醋調末入喉四五嗽痰大吐痛立止章數以告人傳者遂衆用豬牙皂角末醋調塗外頸上干則易之其孔蛾即破而愈矣喉中忽生肉如桃如雲層層而起用綿裹箸頭蘸食鹽點肉上一日五六次自消再服後藥桔連湯苦桔梗川黃連倍加枳實炒前胡連翹去心陳皮防風製半夏柴胡南星白附子牛蒡子炒研元參赤芍莪朮煨甘草各等分水煎服喉閉急症方鴨嘴膽礬研極細末以釅醋調灌吐出膠痰即愈喉痹壅塞不通染色紅花搗汁服一小升如干者浸汁服急喉痹纏喉風不省人事牙關緊閉白礬五錢巴豆去殼三枚將礬入銚內慢火熬化為水入巴豆於內候乾去巴豆取礬研末每用少許吹入喉中頑痰立出即愈喉蛾湯水不下方燕窩土雄黃各等分共研細末以堆花燒酒調敷咽喉外兩旁即愈喉痹喉蛾纏喉風急治方豬牙皂角一兩去皮弦研細末水二鍾煎半鍾加蜜一匙調服吐痰驗如牙關緊急以紙研出巴豆油去巴豆渣捻紙作捻子燒著吹滅熏兩鼻即蘇治雙單乳蛾並喉痹方用壁上蜘蛛白窩取下將患者腦後頭髮一根纏定蛛窩上以銀簪挑窩燒存性為末吹入患處立消蜘蛛有花者有毒不可用治乳蛾神效方乳蛾急症也此方甚效有力者宜預製以救人臘月八日雄豬膽一個裝入白礬末陰乾之後研末再入臘八日豬膽內如此三四次倘遇患者用一二分吹之即愈神驗治雙單蛾神方凡雙單蛾頭頂上有雙紫泡謂雙蛾有單紫泡謂單蛾先用銀簪挑破擠出紫血則患勢稍衰不緊矣若看不出紫泡者謂之隱蛾先用桐油蘸於鵝翎上在舌根下絞出痰涎俟鼻中知桐油臭即止再用馬蘭頭草搗汁同好醋含漱數次即愈冬月無馬蘭頭草用山豆根一兩煎極濃汁用醋漱亦效治雙單喉蛾腫閉方冰片三分麝香三分皂角刺三分共研細末將竹管吹入一破即愈加山豆根射干花根更神妙來泉散治乳蛾良方雄黃一錢雞內金三個焙脆存性生白礬一錢共研細末入瓶收貯聽用令患者先用涼水漱口將藥用竹管吹至喉中即吐涎水碗許其痛立止咽喉腫痛射干根山豆根共為末吹之立消止痛如神口疳神方亦治喉癬喉㿈橄欖核煅存性三錢孩兒茶二錢人中白三錢鳳凰衣煅存性三錢即孵退雞蛋殼共研細末每用藥一錢加冰片三分吹搽患處神效咽中結塊不通水食危困欲死百草霜蜜和丸芡實子大每用新汲水化一丸灌下甚者二丸即愈腰痛用豬腰一付去內筋膜裝破故紙杜仲末線扎好將黑料豆三合以豬腰子放豆中水比豆高一指少入鹽兩匙煮三四滾悶一時藥末棄去將腰子空心嚼吃料豆常吃不過三服即愈治腎虛腰痛方其痛悠悠緩緩即是腎虛杜仲酒浸炙乾搗羅為末無灰酒調下腰痛六合散治腰痛傴僂不能步履杜仲炒斷絲肉蓯蓉酒洗去鱗甲川巴戟小茴香補骨脂鹽湯淨浮水面者掠去不用淨青鹽各等分共研細末聽用再用羊腰子二個將竹刀剖開散藥末在上仍合住外用熟麵包好微火煨熟好酒送下治腰腿中濕冷疼痛年久不愈屢驗方當歸一錢酒洗川芎五分大熟地一錢酒洗白芍一錢酒洗川牛膝一錢去蘆焙木瓜五分肉桂五分防風五分獨活五分石斛一錢酒焙廣木香三分白茯苓一錢炙草三分生薑一片黃酒半鍾水二鍾煎一鍾空心服挫閃腰痛方神麯一塊如拳大火燒通紅淬酒二大碗飲之即愈治鵝掌風用皂角為粗末將鵝卵石燒紅小瓦一塊盛在升中上加皂角末燒煙燻之其皮癢甚再熏數次自愈鵝掌風病用真蘄艾四五兩水四五盞煮五六滾入大口瓶內麻布二層縛之將手心熏之冷則再熱神效手足雁風方側柏葉敗船灰先將敗船灰研末桐油調搽再將柏葉燒煙燻之一二次全愈鶴膝風槐枝松枝桃枝芫花根共搗煎汁小深盆盛熏膝被蓋候汗揉之再以草烏細辛防風等分末縫靴襪護膝內久而自愈遠行腳腫摻鞋底或水濕草鞋摻之甘菊花陳艾葉作護膝帶之腳氣薏苡仁作粥食赤小豆和鯉魚煮食寒濕腳氣麵皮醋蒸尉之互易至汗出為妙腿痛腳氣麻絲方好線麻用木梳將粗皮渣滓梳淨只存絲筋用四兩懸起自下往上用火燎焦存性研極細用好酒二大碗煎熱量人酒量飲之身上蓋暖腳下用燒熱磚踏之則藥力下行以腿上出汗腳心出黏汗為度即愈治寒濕腳氣甚應膏廣膠三兩蔥姜各半斤搗汁留用另將好陳酒糟取糟油二盞或用米醋一碗和陳糟裝細絹濾取汁二盞同膠蔥薑汁熬成膏布攤貼之即止痛消腫愈治風濕腳氣方腳氣之症感濕而身發熱腳忽腫者是也不可用人參犯之即死切忌切忌柴胡防己各一錢芍藥三錢茯苓五錢陳皮甘草各五錢薏仁一兩水煎服一二劑愈一用人參則引邪入氣分蓋腳氣乃犯血道故宜從下散而不可引上也引上必致犯心故主死治腳氣神效方金銀藤鬧洋花二蠶砂各四兩垂楊柳枝七寸長的要二十一枝熬水熏洗軟腳病乃腎虛淨杜仲一兩寸斷去絲半酒半水一大盞煎服數劑調理保中即愈腳腿紅腫方俗名遊風鐵鏽熱如火炙者以鐵鏽水塗解腿腫腹內成塊田桃樹根牛蒡根牛膝各二斤慢火煎膏如飴每熱酒服一匙食前服火丹熱毒燕窩土用向陽者雞子白和敷滿身麻木楝樹子燒灰研末每服三五錢黃酒調下即愈軟癱樺皮燒灰為末每服二錢酒下久服自效骨痿何首烏一斤牛膝半斤煉蜜為丸每酒服五錢二便關格皂莢燒研粥飲下三錢立通燥結輕粉五分砂糖一彈丸搗丸梧子大每服五丸臨臥溫水下治小便頻數有餘滴腰膝冷腎囊濕兩腳無力故紙鹽水浸酒炒二兩白茯苓一兩沒藥五錢去皮共為細末用黃酒浸高藥一指煮化和沒藥丸梧子大每服三十丸空心白湯下小便閉脹不治殺人蔥白三斤切炒帕盛二個更換尉小腹上氣通即便癃淋馬齒莧搗汁飲地髓湯治五淋小水不利莖中痛欲死牛膝一兩洗淨水五鍾煎一鍾去滓加麝香少許研調空心服小水不通方芒硝一錢研細末以龍眼肉包之細嚼咽下立愈小水不通方舊麥草帽一頂煎水飲之即通大便閉結同此治小便淋痛方用蜀葵花根洗銼水煎五七沸服之如神若淋血加車前子一錢同葵煎服萃仙丸專治遺精沙苑蒺藜八兩蓮鬚四兩芡實四兩山萸肉四兩枸杞二兩川斷二兩龍骨五錢覆盆子二兩菟絲子二兩杜仲二兩上金櫻子膏二兩白蜜十兩共和為丸每服五錢清早淡鹽湯下無夢遺精韭子一兩炒研每酒服二錢並治白濁盜汗夢泄用豬肚雄者一個洗淨杜仲半斤用線縫固煮爛去藥連湯食盡即愈此方又能治腰疼神效治自汗黑豆淘洗磨成豆腐漿鍋內熬熟結成皮每食一張用熱黑豆漿送下即效凡人每日清晨吃黑豆漿大有補益可以免癆病之患治盜汗用雞蛋五枚將外殼周圍輕輕敲碎不可損傷內之白皮浸童便內一晝一夜取出用冷水漸漸加火煮熟食之二次即愈凡人每日清晨食二三枚大有補益治盜汗方蓮子七枚黑棗七個浮麥一合馬料豆一合用水一大碗煎八分服之三劑全愈黃疸取黃法屢試屢驗用竹連紙一張裁為四條筆管卷如爆竹式將一口用糊黏固外用黃蠟一兩鐵銚熔化將紙筒四圍澆勻不可使蠟入筒內令患者仰臥將蠟筒套在臍上再用面作圈護住筒根勿令倒勿令泄氣筒頭上點火燒至筒根面圈處剪斷另換一新筒再燒看臍中有黃水如雞子清者取出輕者熏三五筒重者熏二七或三七或七七筒總以取盡黃水為度神效治黃疸如金方晴明天氣時清晨勿令雞犬陰人見取東引桃根細如箸若叉股者一握切細以水一大升煎空腹頓服服後三五日其黃離離如薄雲散開百日方平復也黃散動可時飲清酒一杯則眼中易散否則散遲忌食熱面豬魚等物黃疸尿赤頭髮燒灰水服一錢日三次祕方也黃胖病方馬蘭頭根杵汁半碗沖酒服之每日一服半月即愈羊癇風方甜瓜蒂七個研細白礬一錢無根水調送下即吐痰過五日再吃一服全愈羊頭風病俗名羊纖風黑羊糞瓦上焙乾為末一錢糖湯下狂跳邪語陳細茶白礬各三錢為末飯搗丸梧子大硃砂一錢研細為衣發時服三錢失心癲狂真鬱金七兩明礬三兩為末薄糊丸梧子大每白湯服五十丸多年內傷此方憑醫看準冬瓜子為末溫酒服之治傷寒初起方不拘男女老少皆宜元參一兩二錢水二鍾煎一鍾去渣趁熱服蓋暖衣被出汗即愈小兒減半用之此方系仙傳傷寒點眼方粉甘草六分冰片四分病起一日至六日男左女右點之出汗即愈如過七日不論男女兩眼並點神效專治結胸停食傷寒糟蒲餅陳香糟六兩冰姜菖蒲根各四兩鹽二兩共研勻炒熟為餅貼胸前痛處以火尉之內響即去如口渴任其吃茶水待大便利下惡物即愈雞子飲專治狂走傷寒用出過小雞的蛋殼泡湯服即睡治瘟疫傷寒時症或飯後氣惱心口脹悶填塞不舒方上好蒸酒燉熱將布二塊蘸酒自胸向下擦抹如布冷另換一熱布輪替擦抹如此數次病氣下通即能大便而痊此非誤下陷胸之症故治法不同於用湯液誠補古法之所不及者也治瘟疫傷寒時氣方少宰奉倩李先生傳麥冬三錢去心烏梅肉三個芫荽梗三十寸燈心三十寸竹葉三十片紅棗三枚去核水煎熱服少宰云此係祕方最效祕傳除瘟救苦丹專治一切瘟疫時症傷寒感冒無論已傳經未傳經大人每服一丸小兒半丸涼水調服出汗即愈重者連進二服未汗之時切不可食熱湯熱物汗出之後不忌此丹百發百中奇效無比有力者宜修合以濟世最妙瓜兒天麻麻黃乾薑松蘿茶各一兩二錢緑豆粉一兩二錢甘草硃砂飛過雄黃飛過各八錢生大黃二兩上藥共為細末煉蜜為丸如彈子大收瓷器內勿令泄氣闢瘟丹紅棗二斤茵陳切碎八兩大黃切片八兩加水安息更妙如無亦可以上三味合一處清早燒能卻時症瘟氣水安息系外洋來者大藥店方真陳宜仲嘗夢神人語曰天災流行人多死於疫癘惟服大黃者生事見宋史說儲頭面腫大如斗二目難開危急者服之奇效牛蒡子炒香研苦桔梗荊芥穗焙家菊花黃柏梢龍膽草防風羌活連翹去心蔓荊子去蒂焙薄荷葉藁本元參白芷升麻川芎生甘草各三錢上藥共合一處入淨砂鍋內注水十碗在病人房內炭火慢熬至五碗為度去渣將病者仰臥以小鐘徐徐灌之勿令間斷服完其腫自消須善調養數日再服清胃之藥必無後患蝦蟆瘟頭項腫大福建靛花研細三錢和雞子清一枚燒酒攪服側柏葉搗自然汁調蚓泥燒研敷靛花染坊內可覓治頭風不拘偏正立刻止疼方硫黃一錢川椒取紅色者去黑子為末三分上二味拌勻溶成小餅左疼塞左鼻清涕從右鼻出右疼塞右鼻正疼左右俱塞清涕流盡即愈神效治偏正頭風熏鼻方藁本五分細辛五分香白芷一錢辛夷八分共研細末分為四分用紙四條卷實將火點著以煙燻鼻日熏二次即愈頭風用陳蕎麥麵作餅趁熱貼於頭上患處外用絹扎好出汗風毒收盡入餅內兩次即愈治噎隔反胃回食水穀不進即刻回生方夏月中伏天糞坑中蛆愈大愈好撈出以長流水洗淨用桶瓦二個盛蛆在內鹽水和泥將瓦兩頭封固木炭火煅一炷香煅至蛆身黃色如尚未黃再入砂鍋焙黃最忌用鐵器銅器每服用黃蛆一錢五分研末細松蘿茶七分五釐廣木香一分五釐研末制豆蔻四分五釐共研極細末五更時空心溫干燒酒半茶鐘調服如不能飲酒者水酒調下切忌麵食葷腥數日治翻胃神效方用極大枳殼兩半個去內穰將真阿魏六七分杏仁去皮尖十餘粒共搗爛入枳殼內將兩半殼合口外用綿紙裹好線扎緊入滾水內大火煮半日取起去殼內藥將殼焙乾為末燒酒送下重者不過二次即愈初起者神效久難見功治噎食神驗方生薑不拘多少五月五日午時用布袋藏好浸於不見天之東廁內四十九日取起掃去穢物懸空吊曬極干為末病二年者用薑末三分病一年者用薑末二分入麝香一二釐沖白滾水與病者吃下只一服而愈服藥後不可輕叫病人吃飯先須飲米湯一日次日方可少吃稀粥五六日後漸漸吃飯總以少吃為妙忌葷腥鹽醬並醬小菜五十日永不再發此方極效無比有力者宜預製以救人最效治噎食轉食奇方黃鱔魚一條用無灰黃酒量魚大小酌酒多寡煮酒干為度連皮帶骨用淨砂鍋焙存性研為細末病勢重者每服三錢輕者每服二錢五分為止不可多用黃酒調服若在上半月其效尤速下半月其效較遲三服見功五服全愈愈後宜服淡飲食陸續吃稀粥可以忌一切思慮籌畫氣惱葷腥椒酒色欲房勞尤宜慎之轉食用靛花水送下噎食轉食服藥後恐大寒常吃些薑湯尤妙治九種心胃疼諸藥不效者此方神效附子黃連各一錢白芍五錢水煎服即愈寒熱乘於心胃之間兩相攻戰所以作痛此方黃連平心火附子去胃寒而白芍入肝平木不使克其胃又去郁生心血譬如兩人爭鬥有和事人自然紛解也所以諸藥不效服此神效耳治九種心疼胃氣疼神驗方千年石灰一兩生熟白礬各五錢共為末薑汁為丸梧子大或薑湯或燒酒送下七丸即愈有力仁人修合以濟世功德無量治九種心胃疼痛方病發時用艾葉十斤揉碎在銅杓內炒不可住手用箸動撥將鹽滷豆腐店內不曾加水者半小鐘傾入候焙乾倒出研末用熱燒酒一杯送下俟腹內作響或降氣或吐出清水即愈此方須現制現服隔夜即不效見雞犬陰人即無效服後須戒茶鮮肉三日愈後每逢初一十六日用淡鹽湯吃一服永不再發吾母太夫人生余之時因得此症歷久不愈遍覓醫方未獲其效余因立願如得應手奏功而不再發者即當公之大衆廣救疾苦昨承乏云閒得此方於定海許進一服而愈不復再發真仙術也不敢自祕謹刊刻流傳以廣益效治胸胃肚腹疼方香元散專治此症驗香附一兩醋炒蟾肚鬱金一兩炒元胡索一兩酒炒廣木香二錢共為細末好酒送下滾水送亦可治胃疼方貴州南龍府經廳周夢龍傳云平淡屢效紅棗七枚去核搗爛橘皮三錢生薑三錢煎服治胸膈疼方屢驗密雲縣牛欄山楊醫傳韭菜汁半鍾服下即愈止疼此方胸以上皆可用治胃氣痛方良薑酒浸曬三次香附醋浸曬三次俱為末若因寒而起者良薑用二錢香附用一錢因怒而起者用香附二錢良薑一錢加生薑汁一小匙米湯調服二賢散治脾家冷積每食已輒胸滿不下百藥不效者兼治一切痰氣特驗真橘皮一斤柑橙勿用去穰甘草四兩鹽花四兩水五碗慢火煮二味令乾焙為末每服二三錢白滾水沖服按方勺泊宅編云伊舅莫強中令豐城時得此病偶家人合橘皮散因取嘗之似相宜遂連日服之一日忽覺有物墜下大驚目瞪自汗如雨須臾腹痛遺下數塊如鐵彈子臭不可聞從此胸次廓然其疾頓愈蓋脾之冷積也治十種水病腫滿喘促不得眠臥螻蛄五枚即北人呼為拉拉呼者焙乾為末以飯湯調半錢服之二日進一服陸續隨加加至一錢以小便通方效治水臌方紅芽大戟一兩杭州者佳連珠甘遂一兩芫花一兩醋炒淡澤瀉一兩五錢苦葶藶五錢另研先將前四味研細末後加葶藶末和勻酒煮糊為丸如梧桐子大每服二十丸量人虛實加減其藥引湯液俱先夜煎好候用俟次日五更空心服第一日煎商陸湯送下取黃水第二日煎燈心湯送下取黃水第三日煎麥冬湯送下取白水第四日用田螺四枚煎酒送下取腹水第五日用大鯽魚三尾煎酒送下取五臟六腑水皆盡第六日煎木通湯送下第七日煎梔子湯送下腫消臌散忌服鹽醬房事再服善後之藥七日畢方服鹽醬開鹽醬服藥方赤芍藥白朮土炒云白苓澤瀉上藥各等分研末用鮮鯽魚一尾剖去腸入鹽麝少許將前四味裝魚腹內火上焙乾為末每服二三錢殭蠶湯送下治水臌驗方裕州庠生龔方遂云水臌者乃寒茶冷水積聚所成溢於皮膚是為水臌非外感風寒內因脾胃虛寒也惟攻去積聚使水從大便而出則小便利而病去矣補益之藥只可微使於病愈之後斷不可遽施正病之時此屢驗之論也豫嘗患此症按書載各方治之勿瘥遇一雲遊瘍醫教服雷音丸而痊雷音丸方巴豆二兩去仁不用只用豆皮每豆二兩可得皮三四錢微炒黃色萬不可用豆仁一粒縮砂仁一兩炒川大黃三錢半生半炒乾薑三錢炒黑廣木香三錢炒黑牙皂二個去筋炒甘遂一錢五分炒黃色上七味共研細末絹羅過醋打麵糊為丸如緑豆大鍋底煙煤研細為衣曬乾每早空心薑湯送下三四十丸每服可泄水二三次日服日瀉日瀉日消大便漸實小便漸長漸白直服至水盡為度但須量人老少壯弱瀉之多寡加減丸數不可拘執此藥治病多則一料少則半料必愈亦兼治酒積食積俱獲奇效珍之祕之此藥雖泄而不傷元氣凡水臌服藥之後切忌鹽醬一百多日若一犯再病不救矣醋用臘醋煙煤即百草霜宜用燒雜草者佳甘遂用甘草水浸三日日換一次要看水無黑色為度然後用麵包向火煨之面俱黃色而止但甘遂與甘草相反在醫者善用之蓋甘遂性烈去其暴也治水腫方祕方名消河餅田螺四枚去殼大蒜頭五個去衣車前草三錢一方用車前子研末上三味同搗為膏作一餅覆臍中水從便出即愈貼藥後仍以手帕縛之少刻小便分利且多換二三餅尤妙治氣臌水臌奇方楊澤清傳藥味最難遇巧備存頭生男胎臍糞一具頭生雞子一枚將雞子敲一孔傾盡清黃將糞填滿殼內用厚紙封好候母雞孵卵日同孵二十一日取出將糞研極細末預鏇用沉香木筒一個將糞裝入上蓋以水銀一兩養之再用黃蠟封固筒口常帶身邊借人氣養之遇用時傾入水銀以骨簪挑糞按男左女右點大眼角內如系氣臌則下氣多水臌則小便多俟腹平如常仍用補藥收功治氣脹氣蠱方白蘿蔔汁浸砂仁炒乾連浸連炒數次後將砂仁為末每服一錢米湯送下數服必愈治中滿臌脹方陳胡蘆瓢三五年者一個以糯米一斗作酒待熟以瓢於炭火上炙熱入酒浸之如此三五次將瓢燒存性研末每服三錢酒下神效治便血驗方極老苦𦽿菜陰乾一大把水煎一大碗空心服即愈治糞後下血方艾葉生薑煎濃汁服三合治腸紅方臭椿樹根皮東行者三錢槐角一錢側柏葉一錢小竹葉一錢地榆炒黑一錢水煎溫服重者不過三服即愈屢驗如神治猝瀉鮮血方小蘇根葉搗汁溫服一升治腸風臟毒方用薊餅燒灰沖滾水飲服二錢神效忌同蟹食治臟毒下血方苦楝子炒黃為末煉蜜為丸如梧子大以十丸添至二十丸空心米湯服治脫肛奇方用蟬蛻為末菜油調敷肛門立收治三日或間日瘧二三年不愈者一服即愈屢驗神方當歸半夏各五錢常山二錢五分檳榔二錢五分紅棗半斤去核用好酒一斤河井水共一斤將前藥並棗煮用新砂鍋煎爛放屋上露一宿來日清晨將藥棗溫熱服之連棗作幾次吃完即愈忌雞肉雞蛋一月勿食截瘧神方儀徵楊賡起軍門家傳祕方屢驗多人青蒿八兩青皮二兩真川貝母一兩五錢檳榔二兩厚朴二兩神麯二兩半夏二兩甘草五錢上藥共為末薑汁為丸緑豆大硃砂為衣於未發前三個時辰每服三錢薑湯送下切忌即用飲食此藥不可經陰人之手治瘧疾膏藥效方大興楊澤清傳生薑二兩搗爛如泥牛皮膠二兩將膠熬化投姜泥攪勻熬成膏聽用先以皂莢水洗淨脊膂背腰油膩泥垢拭乾再以生薑一大塊遍擦各處再酌量脊背之寬長剪細布一大塊將膏攤上貼之再搓手心令熱遍摩脊背各處俱覺熱為善俟一二日後不發即痊蓋此症多因內傷生冷茶水食物外受寒氣侵於太陽膀胱寒水經太陰肺經與痰水凝結不解而成此膏重用生薑散其錮冷所以即痊然姜多絲筋非搗如泥則渣滓浮高藥氣不厚功力淺鮮無益用膠者藉其黏性不脫也此方簡易屢效治疝病難忍及囊腫如斗腎子痛者雄黃甘草各一兩白礬二兩共研細末每用一兩滾水五升沖和洗患處良久再暖洗至冷候汗出痊疝靈散治偏墜七疝腎囊腫大疼連小腹不能自忍服之極驗龍眼核荔枝核二味先搗碎焙小茴香各等分焙共為細末每服一錢空心用升麻煮酒送下重者二服治心腹小腸痛小腸疝氣血氣疼痛及産後一切疼痛諸藥不效者此藥能行能止妙不可述五靈脂等分蒲黃等分研為末或酒或醋調勻熬成膏再入水一鍾煎至七分熱服或醋糊為丸童便酒服亦可治腎子大小偏墜方用綿花子煮湯入甕將腎囊坐入甕口俟湯冷止一二次散其冷氣即愈治偏墜神方用冰姜一大塊光粉一塊等分同搗極爛塗腎囊上仰臥以油紙襯好勿汙被褥少頃大熱切勿動手聽其自落塗兩次即可斷根日久腎子大者亦漸縮小矣治偏墜小腸氣屢驗方吉晉榆社尉宛華亭多年煮肉菜沙鍋底一個打碎入鍋用芝麻油一斤許煎至焦枯看火起煙盡起鍋冷定研細蜜丸每服三錢黃酒送下治疝氣神效方荔枝核四十九枚陳皮九錢硫黃四錢共為末鹽水打麵糊為丸如緑豆大遇痛時空心溫酒服九丸良久再服不過四五服其效如神兀霜膏治咯血吐血虛勞嗽神方烏梅汁梨汁柿霜白砂糖白蜜蘿蔔汁各四兩生薑汁一兩赤苓末八兩乳汁浸曬乾款冬花紫菀末各一兩上藥共入砂鍋內熬成膏丸如彈子大每服一丸臨臥含化咽下治吐血方凡吐血切不可服藥只自己小便一味可以除根朝晨起身將隔宿小便溺去稍食米食點心靜坐一室不可說話亦不可立起惟閉目靜心用藕二三片微搗泡湯置壺內隨斟隨飲俟湯漸完即欲小便用潔淨大碗盛受其色白如泉味極淡乘熱吃下以南棗二枚咀嚼自不噁心吃後便可照常辦事忌蔥姜椒蒜辛辣之物飲至半月即可除根矣每逢節氣照前飲幾日更妙治勞病虛病神方此方專治血氣兩虛骨蒸勞熱身體羸瘦四肢痠軟精神倦怠腰痛脊疼飲食不進以及陰虛吐血咳逆一切不足弱症服之屢效症輕者二三料全愈症重者四五料除根即無病常服可保身強神旺此方極易極驗余得之異授見者廣傳功德無量枇杷葉五十六片新鮮者更佳如無即乾者亦可凡咳盛者多加倘不咳嗽者不必用多洗淨葉上毛大梨二個深臍者佳去皮心切片用白蜜半鍾先熬滴水成珠大便乾燥者多加大便溏瀉者不用可大棗半斤或黑圓徽棗皆可建蓮肉四兩不必去皮先將枇杷葉放銅鍋內或砂鍋用河水多煎幾滾取湯用絹瀝清汁其煎過葉棄去不用後將梨棗蓮蜜用拌放鍋內鋪平然後將所煎枇杷葉清汁淹滿略高些蓋好煮半炷線香翻轉再煮半炷線香用瓷罐收貯隨意溫熱吃最益臟腑棗煮熟乘熱剝去皮虛弱咳嗽者頗多若不早治肺若咳損極難醫治惟此方治咳嗽效應如神如虛弱並不咳嗽者枇杷葉不用只用河水同煎咳嗽多痰者加川貝母一兩研極細末俟煮熟時入內再一二沸取起若吐血用藕節搗汁同煮冬月多制久收不壞惟夏月少制供一二日食治虛勞奇方一切骨蒸癆熱服之如神當歸三錢川芎二錢芍藥二錢炒大熟地三錢用柳樹根酒炒一兩水二碗煎七分不拘時溫服治癆怯妙法凡男女患一切癆怯但有脈有神者無不效應上好箭頭砂一兩透明雄黃五錢上二味研為細末單層綿紙包固選未曾行經十二三歲壯實童女將藥貼放童女臍內汗巾拴縛一周時取下稱藥比前多重三錢余者更妙即刻拴於病人臍上先備人乳十餘碗候病者口乾發燥飲之渴止乳亦止然後解去臍上之藥其病自去再用補藥調養十人活九治痢疾神驗方陳茶葉陳皮生薑各二錢食鹽一錢煎服不拘赤白即愈小香連丸此方治痢疾全活者甚多蘄艾八兩搗如綿以黃米煮成薄漿拌透曬乾為末陳香茹苦參各八兩青木香三兩甘草一兩川黃連二兩檳榔四兩牽牛末四兩烏藥六兩上藥共為細末水丸外加川鬱金二兩研極細末為衣或云大者為薑黃小者為鬱金非也水磨去一分看有緑色者為真此方順氣磨積祛暑消痰誠痢症之聖藥也白痢砂糖湯下余俱薑湯下每服二三錢量大小投之其效在大香連丸之上治痢神效方無論新久痢症一貼即愈油當歸一兩枳殼三錢麵炒黃芩五錢水三鍾煎八分服渣再煎服忌葷腥三日重用當歸取其滑潤枳殼專利大腹黃芩清暑熱腸香參丸治痢極效百發百中之藥也木香四兩苦參六兩酒炒生甘草一斤熬膏丸梧桐子大每服三錢治大人小兒噤口痢神方五穀蟲水洗淨瓦上焙黃色研為末用黑糖拌勻新汲水送下即愈又方石蓮子肉一兩去心木香三錢研末每服二錢米湯調下治休息久痢方豆腐醋煎久食之即愈治休息痢方屢驗多人輕則一服重則二三服即愈神效之極不論男女俱可用藕節七個荷葉蒂七個側柏葉七錢炒臭椿樹皮七錢地榆七錢照方用井水河水各一半放大砂鍋內煎好露一宿盡力溫服待煎好用沖淨白糖七錢各樣分量要准不可忽意久痢方東平展子明傳柿餅一枚入白礬一塊煅存性研末黃酒調服不過三服即愈屢驗又方用陳石榴皮焙乾研末每服二錢米湯下百方不效服此便止不可輕視治五更時溏瀉一二次經年不愈方五味子二兩吳茱萸五錢湯泡同炒為末每早二錢用陳米湯送下立止水瀉方車前子一錢澤瀉一錢厚朴一錢二分薑汁炒共為細末熱水調服即愈玉露霜治老人脾泄最宜白朮二兩炒陳皮一兩五錢蓮肉四兩去心薏仁四兩炒糯米一升炒糖霜量加陳米一升鍋焦炒緑豆一升炒共為細末每服二三錢滾水調勻服之芡實散久服延年益壽身輕不老芡實粉金銀花干藕各一斤蒸熟曬乾共為末湯水調服燒棗丸通州馬荊襄傳治泄泄不止雖至面黑氣息奄奄者亦立效回生沉香木香公丁香胡椒官桂乾薑砂仁赤小豆各等分共研為末煮紅棗肉為丸仍以棗肉包之再以麵裹煨熟米湯送下治轉筋霍亂法令病人面牆直立一人以手蘸溫水在腿彎內反手拍打數十有青紅脈突起即將針刺其上出黑血立止治霍亂方掃帚略用者可久則無穗矣用高粱掃帚上穗子連枝梢一把煎湯溫服立愈又方藿香葉廣陳皮各五錢水二鍾煎一鍾溫服立愈路中暑方大蒜搗爛路上土新汲水一盞調服或灌立止治中暑口渴飲水身熱頭暈發昏者石膏五錢煅知母二錢五分生甘草粳米一撮水煎服病重者加倍用治中暑悶方扁豆葉搗汁飲之立愈治絞腸痧方此症夏天最多肚腹急痛唇指青黑者用透明生白礬研末每服二錢用冷水熱水各半杯調服即愈仁人須預帶明礬或在舟車長途或黑夜之際應手奏功再於爪甲肉際臂腿彎等處刺出黑血為要切忌薑湯茶葉湯大葷米麵直待甚餓吐瀉三個時辰方可食粥此症須認明若陰症誤視不效簡便痧方患痧大抵腹痛亦有並不痛者但昏沉脹悶莫可形狀醫未能識者急取田中生芋艿洗淨嚼之如非痧則生澀難食若是痧則甘美異常再食一枚脫然起矣屢驗腹痛者同治治陰症神方白明礬一分胡椒二分芒硝一分共為細末鹽醋調和攤男左女右手心緊合陰處蓋暖出汗即愈其效如神急救陰症腹痛方瀛海淳朴堂王祐之刊施磏三錢研細滾燒酒送下即愈預將生黃豆令病人嚼之不知豆者是心疼小腹疼痛面指發青乃陰症也左犬皿龍即白鴿屎一大抄研極細末熱酒一鍾攪勻澄清頓服寒火相結小腹疼痛方俗名陰寒此方屢驗枯白礬棗子大一塊帶須蔥白三段胡椒按病人歲數一歲一粒用男孩兒吃之乳合一處共搗為丸安放肚臍上一炷香時痛即止忌用生冷要緊治小腹痛諸藥不效方用婦人油發燒灰酒調三錢服中風不省人事用柏葉一握蔥白一握連根搗如泥無灰酒一大鐘煎一二十沸去渣溫服治怔忡痰厥方臘八日用大雄豬膽一枚將白礬研細入膽盛滿為度陰乾去皮仍研細每錢加飛硃砂三分和勻用無根水服三銅錢邊即愈所謂三銅錢邊者即一刀圭之意極言其少也怔忡症柏實煮飲日久自愈痰火症真麻油三兩以牛黃五錢明礬一兩研末浸油內痰火發時服一二匙痰自下七粒金丹治哮吼之症神效將瓦放火上燒紅放鵓鴿糞於紅瓦上自然成灰研細好酒送下二三錢即愈治哮病方哮有虛實之分熱哮鹽哮酒哮皆虛症也寒哮實症也寒哮遇冷風而發熱哮傷熱傷暑而發治不同法虛哮方麥冬三錢桔梗三錢甘草二錢水煎服一帖即愈不必加去痰之藥加則不效矣不能斷根另有藥實哮方百部二錢炙草二錢桔梗三錢半夏一錢陳皮一錢茯苓一錢五分水煎服二帖即愈斷根方用海螵蛸火煅為末大人五錢小兒二錢黑砂糖拌勻調服一帖即除根若不服上煎藥止可得半也上煎藥如熱哮加元參三錢冷哮加乾薑一錢鹽哮加飴糖三錢酒哮加柞木三錢定喘止嗽降痰噙化方孩兒茶白檀香白豆蔻桔梗麥冬去心蛤粉各一兩川貝母一兩去心南薄荷天門冬各五錢木香三錢麝香二分真冰片五分上藥共為末甘草四兩熬膏為丸如梧子大每噙化一丸去痰降氣止嗽如神不可備述治鹽哮方鹽哮每朝清晨服豆腐漿愈治冷哮方茯苓乾薑各一兩南星七錢石膏七錢生半夏杏仁各五錢上味共研末每服三錢烏梅燈心湯服冷哮方此非湯劑可治須吸烟法乳香藝香麻黃細辛薄荷各等分為細末撲紙上捻作長條燃火令旺滅之即以煙燻口中及鼻內淚出自痊凡三次作三日治腹中硬塊方臭椿皮在上中者佳要一大束去粗皮止用白皮二斤切碎入鍋內水熬濾去渣用文武火熬成膏薄攤標布上先以生薑搓去垢膩後以火烘熱膏藥貼痞塊上其初微痛半日後即不痛俟其自落一張即好永不再發貼膏時微撒麝香少許於膏藥上然後貼之貼上膏藥周圍破壞出水即驗此方已驗多人即脹滿腹硬過臍者貼一二張即愈真神方也珍之重之孕婦忌用治痞塊神效膏真川白芥子二斤穿山甲八兩用真桐油二斤入銅鍋內先熬半晌次入穿山甲熬數沸再次入白芥子俟爆止濾去渣入飛淨炒黑黃丹八兩收之離火再入麝香末四錢去火氣七日用攤時隔湯化開不可用火又加阿魏四兩更妙此膏效難言述倘若有力者多熬以救人甚妙治痞祕方不論遠年近日服之內化無形不可輕視大黃皮硝各一兩水紅花子研為末急性子各五錢亦研為末用白鴨一隻撏去毛並臟雜不可經水藥共研勻裝入鴨腹用線縫好盛砂鍋內加無灰酒兩大碗上用一砂鍋蓋好要封口嚴密文武火炙乾將鴨翻掉炙黃色破開鴨肚去藥用新青布將鴨腹內揩得乾淨患者將鴨分作二三次吃吃完即愈消痞神丸香附米二兩童便浸炒砂仁七錢炒枳實一兩炒陳皮一兩炒半夏一兩二錢姜炒厚朴一兩二錢姜炒山楂肉二兩當歸身四兩沉香八錢木香五錢烏藥一兩白朮一兩土炒神麯一兩一錢炒蒼朮一兩二錢炒麥芽一兩二錢共炒研為末老米和為丸梧桐子大食遠服二錢五分白滾湯下消滯丸東平展子明傳消一切酒食痰脹腫痛積聚痞癥瘕此方消而不響響而不動藥味尋常功效甚速黑醜頌術二兩微焙南香附醋浸透炒五靈脂微焙檳榔各一兩共研細末醋和為丸如梧子大每服一錢漸加至二錢薑湯下山嵐瘴氣犀角羚羊角雄黃各一錢麝香三分共為末水調服凡飲食之內俱宜用蒜此闢瘴之要味也治中瘴癘毒方水煮犬肉空心恣食飲酒數杯即去溲溺少候清利其瘴漸退蓋犬肉能治其瘴也昔洞庭賀澤民按察雲南時分巡騰衝等處因染瘴癘腰股發熱有監生殺犬煮而饋之食愈客坐新聞新增緊要良方治瘧疾丸青雲樓配製奉送藥黑豆去皮二錢六分白砒六分明雄四分外用硃砂三分為衣以上共重三錢九分為一料每料做成六十三丸必須端午午時先將藥味曬好研末午時修合用者大人只一丸小兒半丸孕婦忌服如此症發三四個後當日食之神效食丸後謹戒油葷生冷及冒風下水忌七日永不發矣治清平丸方此藥性味平和而功用甚大統治一切天行四時瘟疫彼此傳染憎寒壯熱精神昏迷身體倦怠骨節疼痛飲食不進胸腹臌脹炎天受暑痧症霍亂吐瀉春瘟夏瘧秋痢感冒風寒山嵐瘴氣凡此諸病每用二丸開水化服重者四五丸無不應效如噤口痢疾飲水入口即吐者用一丸噙化徐徐咽下開通胃氣即能飲食虔治與人應手取效茲將藥方開後惟願仁人君子好善樂施配合廣濟俾窮檐蔀屋無力延醫者感得賴以治療篤疾檳榔一斤川厚朴薑汁炒廣皮各十二兩藿香六兩制香附半斤酒白芍半斤半夏曲十二兩紫蘇六兩草果仁半斤炒枳實半斤製蒼朮十二兩青皮半斤柴胡半斤炒黃芩半斤萊蔔子四兩炒煨乾姜六兩山楂肉半斤甘草四兩外加神麯三斤陳武彝茶四兩共研細末用生薑十斤搗取自然汁將紅棗打泥泡濃汁拌水泛為丸每丸重一錢五分曬乾透用大瓶盛貯勿泄氣小兒減半孕婦忌服治癲狗咬方青黛三錢真紫竹根三錢馬全子三錢以上三味煎水服之毒即可從大便中出治實火喉症蛾子用生梅子一升蜒蛔蟲不拘多少此蟲俗名滑泥涎其蟲涎滑滿身同裝入壇內日久蟲化成水梅子自干收貯如遇此症用梅子一個噙之即愈又方用青果核不拘多少燒灰存性每錢加上冰片五釐研細末吹之亦效併兼治爛腳不收口者治小兒胎毒爛頭頸日久不愈者用大黑豆一升將水泡一晝夜瀝乾用罈子一個將豆裝入以粗生布封口覆於鉢碗內四旁用磚砌好上用白炭火煅一周時起出以鉢碗內之豆油俟冷塗搽多次即愈治火湯傷方用生貫衆十斤以大為妙切碎炒燥研細末篩過再以童便浸透曬乾再浸再曬如此三五次曬乾收貯用時將生桐油調敷如已起泡出水即干𭣅之即愈此藥須在伏天制好刀傷藥用水龍骨即舊船上捻船之桐油石灰也曬乾研細末用韭菜汁浸透曬乾再以牛膽浸濕拌勻又曬乾研末𭣅之即愈治婦女痛經方採野青菜陰乾為丸每丸重一錢共服三四丸即愈治干蟲食鼻方採野東莧菜搗爛敷滿雞蛋用白麻線一長根將所敷之蛋系穩再用腐乳壇一個入好七醋一酒盞將雞蛋放入壇內即拈線頭塞入鼻孔吸一二次全愈治火眼方用真菜油擦上眼皮一二次並不傳染催生神效經驗良方艾茸八分羌活八分枳殼六分荊芥八分北耆錢半酒炒氣虛者用二錢川貝母另研沖服酒芍一錢當歸二錢川芎錢半菟絲子錢半川厚朴八分薑汁炒甘草五分生薑引此方得自醫學心悟屢試屢效隨手見功凡難産者服之立産不當産者服之即安洵救急之良方濟生之寶筏焉但勿任意增減為囑茶陵談繼善堂刊産後血氣痛方楂肉三錢炒黑煎水紅糖兌服又方元胡索六錢酒炒丹參三錢枳殼二錢煎服腎氣痛方川楝十粒用巴豆七粒同煮取豆瓦上焙枯成炭荔枝核十粒打碎鹽水炒枯吳芋二錢小茴三錢官桂三錢均用鹽水炒同前藥研末白水沖服瘋犬咬神方青黛一兩千年矮連根一握將千年矮煎濃汁沖對青黛一大碗服不過二三劑全愈並不禁忌此方系姜若鵬祖傳屢服屢驗按千年矮一名路邊精五六七月開小白花其根入火爐燒之作貓屎臭者是故俗名貓屎它瘋犬傷馬牛豬羊方用紫竹根入鐵鎖一把同煎牛馬灌犬羊豬拌食及草服之愈中菌毒神方雞毛水服之愈隨食其雞肉妙安胎催生神授祕方妊娠八個月後預服一劑臨盆服一二劑能免一切難産或一切胎動能安其分兩俱屬神授不可任意加減當歸身酒洗川芎各一錢五分菟絲子一錢五分白芍酒炒冬月一錢余月一錢二分川貝母一錢浙貝不可用荊芥穗炒黃耆蜜炙各八分厚朴姜炒蘄艾葉各七分枳殼炒六分羌活甘草各五分姜三片空心水煎服洗眼方用皮硝五錢清水碗半煎七分每月一日三洗辰時向東方午時向南方戌時向西方用黑絹頻洗此日必須潔淨持齊不可亂洗必有效驗日期開後閏月照前正月初三二月初四三月初三四月初五五月初五六月初四七月初二八月初九九月初十十月初三十一月初四十二月初四四物湯治血虛發熱或因克伐潰後失血以致煩燥不安當歸熟地各二錢白芍一錢川芎一錢五分上水煎服
