  - {type: 'tls:div-end', offset: 7529, content: '', id: KR3ed120_jc_003-d5d2}
  - {type: 'tls:div-start', offset: 7529, content: '', id: KR3ed120_jc_003-d5d3, level: 2, head_text: 女科門}
  - {type: 'tls:head', offset: 7529, content: '', id: KR3ed120_jc_003-d5.d3.h1s1}
  - {type: 'tls:div-start', offset: 7532, content: '', id: KR3ed120_jc_003-d5.d3d2, level: 3, head_text: 麥冬丸方}
  - {type: 'tls:head', offset: 7532, content: '', id: KR3ed120_jc_003-d5.d3.d2.h1s1}
  - {type: 'tls:div-end', offset: 7647, content: '', id: KR3ed120_jc_003-d5.d3d2}
  - {type: 'tls:div-start', offset: 7647, content: '', id: KR3ed120_jc_003-d5.d3d3, level: 3, head_text: 四制香附丸驗方}
  - {type: 'tls:head', offset: 7647, content: '', id: KR3ed120_jc_003-d5.d3.d3.h1s1}
  - {type: 'tls:div-end', offset: 7755, content: '', id: KR3ed120_jc_003-d5.d3d3}
  - {type: 'tls:div-start', offset: 7755, content: '', id: KR3ed120_jc_003-d5.d3d4, level: 3, head_text: 經閉乾血等症神方京師朝慶關僧建庵方}
  - {type: 'tls:head', offset: 7755, content: '', id: KR3ed120_jc_003-d5.d3.d4.h1s1}
  - {type: 'tls:div-end', offset: 7895, content: '', id: KR3ed120_jc_003-d5.d3d4}
  - {type: 'tls:div-start', offset: 7895, content: '', id: KR3ed120_jc_003-d5.d3d5, level: 3, head_text: 月水不斷}
  - {type: 'tls:head', offset: 7895, content: '', id: KR3ed120_jc_003-d5.d3.d5.h1s1}
  - {type: 'tls:div-end', offset: 7913, content: '', id: KR3ed120_jc_003-d5.d3d5}
  - {type: 'tls:div-start', offset: 7913, content: '', id: KR3ed120_jc_003-d5.d3d6, level: 3, head_text: 呂祖鸞筆傳治癥瘕屢驗方}
  - {type: 'tls:head', offset: 7913, content: '', id: KR3ed120_jc_003-d5.d3.d6.h1s1}
  - {type: 'tls:div-end', offset: 8097, content: '', id: KR3ed120_jc_003-d5.d3d6}
  - {type: 'tls:div-start', offset: 8097, content: '', id: KR3ed120_jc_003-d5.d3d7, level: 3, head_text: 癥瘕血塊勞疾屢驗多人方}
  - {type: 'tls:head', offset: 8097, content: '', id: KR3ed120_jc_003-d5.d3.d7.h1s1}
  - {type: 'tls:div-end', offset: 8141, content: '', id: KR3ed120_jc_003-d5.d3d7}
  - {type: 'tls:div-start', offset: 8141, content: '', id: KR3ed120_jc_003-d5.d3d8, level: 3, head_text: 赤白帶下}
  - {type: 'tls:head', offset: 8141, content: '', id: KR3ed120_jc_003-d5.d3.d8.h1s1}
  - {type: 'tls:div-end', offset: 8171, content: '', id: KR3ed120_jc_003-d5.d3d8}
  - {type: 'tls:div-start', offset: 8171, content: '', id: KR3ed120_jc_003-d5.d3d9, level: 3, head_text: 赤白帶下無論老幼孕婦皆可服之}
  - {type: 'tls:head', offset: 8171, content: '', id: KR3ed120_jc_003-d5.d3.d9.h1s1}
  - {type: 'tls:div-end', offset: 8220, content: '', id: KR3ed120_jc_003-d5.d3d9}
  - {type: 'tls:div-start', offset: 8220, content: '', id: KR3ed120_jc_003-d5.d3d10, level: 3, head_text: 血崩方}
  - {type: 'tls:head', offset: 8220, content: '', id: KR3ed120_jc_003-d5.d3.d10.h1s1}
  - {type: 'tls:div-end', offset: 8247, content: '', id: KR3ed120_jc_003-d5.d3d10}
  - {type: 'tls:div-start', offset: 8247, content: '', id: KR3ed120_jc_003-d5.d3d11, level: 3, head_text: 血崩久甚不愈}
  - {type: 'tls:head', offset: 8247, content: '', id: KR3ed120_jc_003-d5.d3.d11.h1s1}
  - {type: 'tls:div-end', offset: 8283, content: '', id: KR3ed120_jc_003-d5.d3d11}
  - {type: 'tls:div-start', offset: 8283, content: '', id: KR3ed120_jc_003-d5.d3d12, level: 3, head_text: 崩中下血}
  - {type: 'tls:head', offset: 8283, content: '', id: KR3ed120_jc_003-d5.d3.d12.h1s1}
  - {type: 'tls:div-end', offset: 8296, content: '', id: KR3ed120_jc_003-d5.d3d12}
  - {type: 'tls:div-start', offset: 8296, content: '', id: KR3ed120_jc_003-d5.d3d13, level: 3, head_text: 血崩}
  - {type: 'tls:head', offset: 8296, content: '', id: KR3ed120_jc_003-d5.d3.d13.h1s1}
  - {type: 'tls:div-end', offset: 8317, content: '', id: KR3ed120_jc_003-d5.d3d13}
  - {type: 'tls:div-start', offset: 8317, content: '', id: KR3ed120_jc_003-d5.d3d14, level: 3, head_text: 無憂散}
  - {type: 'tls:head', offset: 8317, content: '', id: KR3ed120_jc_003-d5.d3.d14.h1s1}
  - {type: 'tls:div-end', offset: 8591, content: '', id: KR3ed120_jc_003-d5.d3d14}
  - {type: 'tls:div-start', offset: 8591, content: '', id: KR3ed120_jc_003-d5.d3d15, level: 3, head_text: 生產保母子神方}
  - {type: 'tls:head', offset: 8591, content: '', id: KR3ed120_jc_003-d5.d3.d15.h1s1}
  - {type: 'tls:div-end', offset: 8807, content: '', id: KR3ed120_jc_003-d5.d3d15}
  - {type: 'tls:div-start', offset: 8807, content: '', id: KR3ed120_jc_003-d5.d3d16, level: 3, head_text: 束胎丸懷妊七八月服之}
  - {type: 'tls:head', offset: 8807, content: '', id: KR3ed120_jc_003-d5.d3.d16.h1s1}
  - {type: 'tls:div-end', offset: 8865, content: '', id: KR3ed120_jc_003-d5.d3d16}
  - {type: 'tls:div-start', offset: 8865, content: '', id: KR3ed120_jc_003-d5.d3d17, level: 3, head_text: 佛手散}
  - {type: 'tls:head', offset: 8865, content: '', id: KR3ed120_jc_003-d5.d3.d17.h1s1}
  - {type: 'tls:div-end', offset: 8996, content: '', id: KR3ed120_jc_003-d5.d3d17}
  - {type: 'tls:div-start', offset: 8996, content: '', id: KR3ed120_jc_003-d5.d3d18, level: 3, head_text: 護胎法方}
  - {type: 'tls:head', offset: 8996, content: '', id: KR3ed120_jc_003-d5.d3.d18.h1s1}
  - {type: 'tls:div-end', offset: 9039, content: '', id: KR3ed120_jc_003-d5.d3d18}
  - {type: 'tls:div-start', offset: 9039, content: '', id: KR3ed120_jc_003-d5.d3d19, level: 3, head_text: 孕婦癃閉涓滴赤色方}
  - {type: 'tls:head', offset: 9039, content: '', id: KR3ed120_jc_003-d5.d3.d19.h1s1}
  - {type: 'tls:div-end', offset: 9067, content: '', id: KR3ed120_jc_003-d5.d3d19}
  - {type: 'tls:div-start', offset: 9067, content: '', id: KR3ed120_jc_003-d5.d3d20, level: 3, head_text: 墜高跌打觸胎不安胎動腹痛}
  - {type: 'tls:head', offset: 9067, content: '', id: KR3ed120_jc_003-d5.d3.d20.h1s1}
  - {type: 'tls:div-end', offset: 9120, content: '', id: KR3ed120_jc_003-d5.d3d20}
  - {type: 'tls:div-start', offset: 9120, content: '', id: KR3ed120_jc_003-d5.d3d21, level: 3, head_text: 治胎動神驗奇方}
  - {type: 'tls:head', offset: 9120, content: '', id: KR3ed120_jc_003-d5.d3.d21.h1s1}
  - {type: 'tls:div-end', offset: 9153, content: '', id: KR3ed120_jc_003-d5.d3d21}
  - {type: 'tls:div-start', offset: 9153, content: '', id: KR3ed120_jc_003-d5.d3d22, level: 3, head_text: 生化湯產下即服}
  - {type: 'tls:head', offset: 9153, content: '', id: KR3ed120_jc_003-d5.d3.d22.h1s1}
  - {type: 'tls:div-end', offset: 9444, content: '', id: KR3ed120_jc_003-d5.d3d22}
  - {type: 'tls:div-start', offset: 9444, content: '', id: KR3ed120_jc_003-d5.d3d23, level: 3, head_text: 開骨丹治產五七日不下及瘦小女子交骨不開死在旦夕}
  - {type: 'tls:head', offset: 9444, content: '', id: KR3ed120_jc_003-d5.d3.d23.h1s1}
  - {type: 'tls:div-end', offset: 9528, content: '', id: KR3ed120_jc_003-d5.d3d23}
  - {type: 'tls:div-start', offset: 9528, content: '', id: KR3ed120_jc_003-d5.d3d24, level: 3, head_text: 治難產奇驗方}
  - {type: 'tls:head', offset: 9528, content: '', id: KR3ed120_jc_003-d5.d3.d24.h1s1}
  - {type: 'tls:div-end', offset: 9668, content: '', id: KR3ed120_jc_003-d5.d3d24}
  - {type: 'tls:div-start', offset: 9668, content: '', id: KR3ed120_jc_003-d5.d3d25, level: 3, head_text: 產寶散}
  - {type: 'tls:head', offset: 9668, content: '', id: KR3ed120_jc_003-d5.d3.d25.h1s1}
  - {type: 'tls:div-end', offset: 9756, content: '', id: KR3ed120_jc_003-d5.d3d25}
  - {type: 'tls:div-start', offset: 9756, content: '', id: KR3ed120_jc_003-d5.d3d26, level: 3, head_text: 治橫生難產子母雙全即時止痛順生驗方}
  - {type: 'tls:head', offset: 9756, content: '', id: KR3ed120_jc_003-d5.d3.d26.h1s1}
  - {type: 'tls:div-end', offset: 9810, content: '', id: KR3ed120_jc_003-d5.d3d26}
  - {type: 'tls:div-start', offset: 9810, content: '', id: KR3ed120_jc_003-d5.d3d27, level: 3, head_text: 難產簡便方效}
  - {type: 'tls:head', offset: 9810, content: '', id: KR3ed120_jc_003-d5.d3.d27.h1s1}
  - {type: 'tls:div-end', offset: 9829, content: '', id: KR3ed120_jc_003-d5.d3d27}
  - {type: 'tls:div-start', offset: 9829, content: '', id: KR3ed120_jc_003-d5.d3d28, level: 3, head_text: 婦人難產三四日不下者}
  - {type: 'tls:head', offset: 9829, content: '', id: KR3ed120_jc_003-d5.d3.d28.h1s1}
  - {type: 'tls:div-end', offset: 9871, content: '', id: KR3ed120_jc_003-d5.d3d28}
  - {type: 'tls:div-start', offset: 9871, content: '', id: KR3ed120_jc_003-d5.d3d29, level: 3, head_text: 婦人逆產}
  - {type: 'tls:head', offset: 9871, content: '', id: KR3ed120_jc_003-d5.d3.d29.h1s1}
  - {type: 'tls:div-end', offset: 9890, content: '', id: KR3ed120_jc_003-d5.d3d29}
  - {type: 'tls:div-start', offset: 9890, content: '', id: KR3ed120_jc_003-d5.d3d30, level: 3, head_text: 胎衣不下效方}
  - {type: 'tls:head', offset: 9890, content: '', id: KR3ed120_jc_003-d5.d3.d30.h1s1}
  - {type: 'tls:div-end', offset: 9916, content: '', id: KR3ed120_jc_003-d5.d3d30}
  - {type: 'tls:div-start', offset: 9916, content: '', id: KR3ed120_jc_003-d5.d3d31, level: 3, head_text: 胞衣不下}
  - {type: 'tls:head', offset: 9916, content: '', id: KR3ed120_jc_003-d5.d3.d31.h1s1}
  - {type: 'tls:div-end', offset: 9933, content: '', id: KR3ed120_jc_003-d5.d3d31}
  - {type: 'tls:div-start', offset: 9933, content: '', id: KR3ed120_jc_003-d5.d3d32, level: 3, head_text: 豬肝蜜酒法治婦人胞水早行胎澀不下}
  - {type: 'tls:head', offset: 9933, content: '', id: KR3ed120_jc_003-d5.d3.d32.h1s1}
  - {type: 'tls:div-end', offset: 9983, content: '', id: KR3ed120_jc_003-d5.d3d32}
  - {type: 'tls:div-start', offset: 9983, content: '', id: KR3ed120_jc_003-d5.d3d33, level: 3, head_text: 下死胎方}
  - {type: 'tls:head', offset: 9983, content: '', id: KR3ed120_jc_003-d5.d3.d33.h1s1}
  - {type: 'tls:div-end', offset: 9999, content: '', id: KR3ed120_jc_003-d5.d3d33}
  - {type: 'tls:div-start', offset: 9999, content: '', id: KR3ed120_jc_003-d5.d3d34, level: 3, head_text: 子死腹中不出}
  - {type: 'tls:head', offset: 9999, content: '', id: KR3ed120_jc_003-d5.d3.d34.h1s1}
  - {type: 'tls:div-end', offset: 10013, content: '', id: KR3ed120_jc_003-d5.d3d34}
  - {type: 'tls:div-start', offset: 10013, content: '', id: KR3ed120_jc_003-d5.d3d35, level: 3, head_text: 產後中風危急屢驗方密雲縣牛欄山楊醫傳}
  - {type: 'tls:head', offset: 10013, content: '', id: KR3ed120_jc_003-d5.d3.d35.h1s1}
  - {type: 'tls:div-end', offset: 10083, content: '', id: KR3ed120_jc_003-d5.d3d35}
  - {type: 'tls:div-start', offset: 10083, content: '', id: KR3ed120_jc_003-d5.d3d36, level: 3, head_text: 產後心痛}
  - {type: 'tls:head', offset: 10083, content: '', id: KR3ed120_jc_003-d5.d3.d36.h1s1}
  - {type: 'tls:div-end', offset: 10120, content: '', id: KR3ed120_jc_003-d5.d3d36}
  - {type: 'tls:div-start', offset: 10120, content: '', id: KR3ed120_jc_003-d5.d3d37, level: 3, head_text: 產後危急血暈惡露攻心將死方}
  - {type: 'tls:head', offset: 10120, content: '', id: KR3ed120_jc_003-d5.d3.d37.h1s1}
  - {type: 'tls:div-end', offset: 10156, content: '', id: KR3ed120_jc_003-d5.d3d37}
  - {type: 'tls:div-start', offset: 10156, content: '', id: KR3ed120_jc_003-d5.d3d38, level: 3, head_text: 產後血暈}
  - {type: 'tls:head', offset: 10156, content: '', id: KR3ed120_jc_003-d5.d3.d38.h1s1}
  - {type: 'tls:div-end', offset: 10201, content: '', id: KR3ed120_jc_003-d5.d3d38}
  - {type: 'tls:div-start', offset: 10201, content: '', id: KR3ed120_jc_003-d5.d3d39, level: 3, head_text: 產後小便不止}
  - {type: 'tls:head', offset: 10201, content: '', id: KR3ed120_jc_003-d5.d3.d39.h1s1}
  - {type: 'tls:div-end', offset: 10292, content: '', id: KR3ed120_jc_003-d5.d3d39}
  - {type: 'tls:div-start', offset: 10292, content: '', id: KR3ed120_jc_003-d5.d3d40, level: 3, head_text: 湧泉散治產母乳汁不通}
  - {type: 'tls:head', offset: 10292, content: '', id: KR3ed120_jc_003-d5.d3.d40.h1s1}
  - {type: 'tls:div-end', offset: 10350, content: '', id: KR3ed120_jc_003-d5.d3d40}
  - {type: 'tls:div-start', offset: 10350, content: '', id: KR3ed120_jc_003-d5.d3d41, level: 3, head_text: 通脈散治乳少或無乳}
  - {type: 'tls:head', offset: 10350, content: '', id: KR3ed120_jc_003-d5.d3.d41.h1s1}
  - {type: 'tls:div-end', offset: 10440, content: '', id: KR3ed120_jc_003-d5.d3d41}
  - {type: 'tls:div-start', offset: 10440, content: '', id: KR3ed120_jc_003-d5.d3d42, level: 3, head_text: 無乳}
  - {type: 'tls:head', offset: 10440, content: '', id: KR3ed120_jc_003-d5.d3.d42.h1s1}
  - {type: 'tls:div-end', offset: 10453, content: '', id: KR3ed120_jc_003-d5.d3d42}
  - {type: 'tls:div-start', offset: 10453, content: '', id: KR3ed120_jc_003-d5.d3d43, level: 3, head_text: 乳吹乳滯方}
  - {type: 'tls:head', offset: 10453, content: '', id: KR3ed120_jc_003-d5.d3.d43.h1s1}
  - {type: 'tls:div-end', offset: 10519, content: '', id: KR3ed120_jc_003-d5.d3d43}
  - {type: 'tls:div-start', offset: 10519, content: '', id: KR3ed120_jc_003-d5.d3d44, level: 3, head_text: 吹乳仙方}
  - {type: 'tls:head', offset: 10519, content: '', id: KR3ed120_jc_003-d5.d3.d44.h1s1}
  - {type: 'tls:div-end', offset: 10551, content: '', id: KR3ed120_jc_003-d5.d3d44}
  - {type: 'tls:div-start', offset: 10551, content: '', id: KR3ed120_jc_003-d5.d3d45, level: 3, head_text: 結乳方}
  - {type: 'tls:head', offset: 10551, content: '', id: KR3ed120_jc_003-d5.d3.d45.h1s1}
  - {type: 'tls:div-end', offset: 10566, content: '', id: KR3ed120_jc_003-d5.d3d45}
  - {type: 'tls:div-end', offset: 10566, content: '', id: KR3ed120_jc_003-d5d3}
  - {type: 'tls:div-start', offset: 10566, content: '', id: KR3ed120_jc_003-d5d4, level: 2, head_text: 小兒門}
  - {type: 'tls:head', offset: 10566, content: '', id: KR3ed120_jc_003-d5.d4.h1s1}
  - {type: 'tls:div-start', offset: 10569, content: '', id: KR3ed120_jc_003-d5.d4d2, level: 3, head_text: 治初生小兒無皮但赤色紅筋乃母氣不充實受胎未足也}
  - {type: 'tls:head', offset: 10569, content: '', id: KR3ed120_jc_003-d5.d4.d2.h1s1}
  - {type: 'tls:div-end', offset: 10604, content: '', id: KR3ed120_jc_003-d5.d4d2}
  - {type: 'tls:div-start', offset: 10604, content: '', id: KR3ed120_jc_003-d5.d4d3, level: 3, head_text: 治小兒初生大小便不通}
  - {type: 'tls:head', offset: 10604, content: '', id: KR3ed120_jc_003-d5.d4.d3.h1s1}
  - {type: 'tls:div-end', offset: 10636, content: '', id: KR3ed120_jc_003-d5.d4d3}
  - {type: 'tls:div-start', offset: 10636, content: '', id: KR3ed120_jc_003-d5.d4d4, level: 3, head_text: 小兒不尿}
  - {type: 'tls:head', offset: 10636, content: '', id: KR3ed120_jc_003-d5.d4.d4.h1s1}
  - {type: 'tls:div-end', offset: 10659, content: '', id: KR3ed120_jc_003-d5.d4d4}
  - {type: 'tls:div-start', offset: 10659, content: '', id: KR3ed120_jc_003-d5.d4d5, level: 3, head_text: 小兒大小便血}
  - {type: 'tls:head', offset: 10659, content: '', id: KR3ed120_jc_003-d5.d4.d5.h1s1}
  - {type: 'tls:div-end', offset: 10690, content: '', id: KR3ed120_jc_003-d5.d4d5}
  - {type: 'tls:div-start', offset: 10690, content: '', id: KR3ed120_jc_003-d5.d4d6, level: 3, head_text: 小兒目閉}
  - {type: 'tls:head', offset: 10690, content: '', id: KR3ed120_jc_003-d5.d4.d6.h1s1}
  - {type: 'tls:div-end', offset: 10718, content: '', id: KR3ed120_jc_003-d5.d4d6}
  - {type: 'tls:div-start', offset: 10718, content: '', id: KR3ed120_jc_003-d5.d4d7, level: 3, head_text: 小兒龜胸龜背}
  - {type: 'tls:head', offset: 10718, content: '', id: KR3ed120_jc_003-d5.d4.d7.h1s1}
  - {type: 'tls:div-end', offset: 10763, content: '', id: KR3ed120_jc_003-d5.d4d7}
  - {type: 'tls:div-start', offset: 10763, content: '', id: KR3ed120_jc_003-d5.d4d8, level: 3, head_text: 小兒臍瘡}
  - {type: 'tls:head', offset: 10763, content: '', id: KR3ed120_jc_003-d5.d4.d8.h1s1}
  - {type: 'tls:div-end', offset: 10774, content: '', id: KR3ed120_jc_003-d5.d4d8}
  - {type: 'tls:div-start', offset: 10774, content: '', id: KR3ed120_jc_003-d5.d4d9, level: 3, head_text: 小兒臍風鎖口}
