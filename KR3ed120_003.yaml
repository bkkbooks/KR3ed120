body:
  text: 卷下外症門治一切腫毒屢驗方杏仁不拘甜苦皆用剖開兩瓣擇選稜齊全者數枚塗以溏雞糞加麝香些須罨在瘡上即吸住不脫移時毒聚則杏仁迸起隨以第二枚罨之仍如前吸注迸起乃毒未盡也即以第三枚罨之其毒起必輕一觸即脫無不愈者巴膏系四川藩司巴公治母痊傳此方治一切惡毒大瘡無名腫毒及一切痞塊神效木鱉子二十一個象皮一兩大穿山甲四十九片油煎化為度巴豆仁三十五粒山梔子八十一個紅者去殼熬化去渣真芝麻油四斤桃柳楊槐桑五種嫩枝各九條撅碎將香油炸枯樹枝用鐵絲小網杓撈出樹枝再入木鱉子象皮穿山甲巴豆仁紅梔子炸化用絹袋濾去渣滓將前油復入鍋內熬沸撤火稍定入炒過黃丹攪勻將鍋取起再入血竭兒茶制乳香制沒藥各三錢硼砂五錢細細攪勻用涼水一盆將膏傾入水內用手扯藥千餘遍再換水數次拔去火氣收貯瓷罐內臨用重湯燉開攤貼忌用火烘治一切無名腫毒方澤蘭葉一兩廣膠五錢另器酒化衝入白芨三錢淮牛膝三錢白芷三錢人身以臍為中如患臍以上及頭面者去牛膝入白芷臍以下及足膝者去白芷入牛膝上下俱患者二味並用水煎臨臥時服接飲熱陳酒必得酩酊蓋被出汗為度已潰未潰服一二劑即愈一切腫毒山藥搗成泥塗之立消惡瘡不斂瓦松陰乾為末先以槐梅蔥白湯洗淨後糝之立效諸瘡十年不瘥者鯽魚煅灰和醬塗之治毒膏貼一切腫毒神效萆麻子四兩去油皮血竭三兩蟾酥一兩乳化乳香一兩出汗松香一兩五錢揉白加頂好麝香三錢為膏貼一切腫毒神效拔毒異法以極細鐵屑將好醋調之煎二三沸撈醋中鐵屑鋪於患處將上好磁石即吸鐵石一大塊頻頻吸之陰症用之其毒自出也一筆銷鬧洋花五十斤揀極淨煎膏將川烏草烏各一兩收之凡遇癤毒用筆蘸藥塗之治腦疽發背一切惡瘡初起方採獨莖蒼耳草一根連葉帶子用切細不見鐵器用砂鍋入水二大碗熬至一碗如瘡在上部飯後徐徐服訖俟吐出吐定再服以藥盡為度如瘡在下部空心服瘡自破出膿以膏藥貼之京兆張公伯王榜示此方傳人後昆弟皆登科甲治發背對口及一切癰疽潰爛有回生功效宮粉一兩輕粉銀硃雄黃乳香制淨沒藥各二分五釐制淨共研極細末聽用先將好茶葉煎濃湯洗患處後將獖豬腰子切開摻藥五分於腰子上蓋患處待藥如蒸良久取去一日一次拔毒減痛潰出膿穢不可手擠輕者二次愈重者七八次可愈此方濟人甚多呂祖治發背靈寶膏桐廬一人因母患發背百治不痊得此方痊愈栝蔞五枚取子去殼乳香五塊如棗大二味共研細末以白蜜一斤同熬成膏每服三錢溫黃酒化服治發背如神真祕方狗牙要大者炒黑研細末聽用先將生蔥熬湯洗瘡再將前末用好醋調敷患處即愈治發背方鮮苦參根去泥洗淨搗爛同雞蛋清攪如糊未潰者滿塗之已潰者四圍敷之中心留頂若經時藥干以井水掃潤之有起死回生之功真神方也勿以平常忽之發背膏藥方此方得之甚難禮下於人設法購求方得到手合藥施送無不立效滴乳香箬包燒紅磚壓去油四兩淨沒藥箬包燒紅磚壓去油四兩鮮紅血竭四兩白色兒茶四兩上好銀硃四兩杭州定粉四兩上好黃丹四兩上好銅緑二兩以上各另碾無聲篩細末共一處臨時照患瘡之大小用夾連四油紙一塊用針多刺小孔每張稱藥末五錢用真好芝麻油調攤在油紙上再用油紙一塊蓋上周圍用線將二紙合縫一處貼瘡上用軟絹扎緊自然止痛化腐生新過三日將膏揭開濃煎蔥湯將瘡上洗淨軟絹拭乾將膏翻過用針照前多刺小孔貼之因藥品甚貴取其又得一面之藥力也無火之人內服十全十補湯有火之人減去肉桂薑棗煎服兼以飲食滋補無不取效至重者用膏二張百無一失寶之發背無名腫毒等瘡紫花地丁三伏時採收曬乾為末飛羅面為糊將末和成餅收貯臨用鹽醋浸一宿貼之甚效治對口仙方此名天疽十有九死可不慎乎鯽魚一尾去鱗腸搗爛入頭垢五六錢再極勻加蜂蜜半杯攪勻從外圖入裡面留一孔出毒氣二次全消即時止痛如已成形有頭將出膿或他醫已治不效而出膿者內服三香定痛飲則能起死回生矣三香定痛飲原方無分兩臨用延醫酌定木香黃耆紫蘇人參厚朴甘草桔梗官桂烏藥當歸芍藥白芷川芎防風乳香沒藥上水二鍾姜三片紅棗二枚煎分食後服對口瘡薑汁磨京墨四邊圍住以白梅豬膽塗瘡口即愈治對口初起方不論偏正用蛇蛻一條煅灰以好酒調服即消治對口瘡方黃蠟一兩頭髮宮粉各三錢麝香少許香油三兩上先將香油熬滾入頭髮次入黃蠟化開再入宮粉略熬一滾退火入麝將古干紙裁成方入油內即取出冷定或每用五張或七張貼患處即出膿矣再貼十餘張即愈一切癰疽瘡疔無名腫毒不論陰陽已潰未潰外科總方桑條如手大指粗細二根炭火燒著一頭吹滅用心熏瘡如未成者便消散或已成者便破有疔去疔有毒去毒熏疼者不疼即安熏不疼者若疼即愈屢驗神效烏龍膏一切癰疽發背無名腫毒初發熱未破者神效陳粉子隔年小麥粉砂鍋焙炒初炒如餳久炒則干成黃黑色冷定又放於地上出火毒研為末陳米醋愈陳亦好調糊熬如黑漆瓷罐收貯臨用攤紙上煎貼之即如冰冷疼痛隨止少刻覺癢干亦不可動或纏裹之久則自消力盡脫落藥易功大濟生者珍之治癰大如盤臭不可近方桐樹葉醋蒸貼之退熱止痛漸漸收口祕方也腸癰小腸堅硬如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒脈緊實而有力服此神效大黃炒朴硝各一錢丹皮白芥子桃仁各二錢去皮尖水二碗煎八分食前或空心溫服腸癰不可藥治用皂角刺酒煎服即從小便出膿立效治大小腸癰凡小腸癰則左足縮大腸癰則右足縮是也用地榆一斤水十碗煎三碗再用生甘草二兩金銀花一兩再煎一碗空心服一服即消久亦不須兩服也但忌房事余不必忌鼠瘻核痛未成膿者以柏葉搗塗熬鹽尉之氣下即消頸上癧瘡舊琉璃燈燒灰菜油調搽神效內消瘰癧祕傳經驗方未潰者內消已潰者亦愈外貼太乙膏收口而愈夏枯草八兩元參五兩青鹽五兩火煅過海藻一錢天花粉生地酒洗川大黃酒蒸貝母海粉白蘞薄荷葉連翹桔梗當歸酒洗枳殼麥麵炒焰硝甘草各一兩上為細末酒糊跌為丸緑豆大食後臨臥低枕用白湯吞百餘丸就臥一時妙頂癭豬喉下肉子七枚瓦焙研末每夜酒服一錢忌酸鹹油膩塞氣之物肺痿肺癰者先因感受風寒未輕發越停留肺中亦有七情飢飽勞役損傷脾肺而生者又有勞力內傷迎風響叫外寒侵入而生者其初則毛聳惡風咳嗽聲重胸膈隱痛項強不能轉側者是其真候也久則鼻流清涕咳吐膿痰黃色腥穢重則胸脅脹滿呼吸不利飲食減少脈洪自汗漸至久咳勞傷咳吐痰血寒熱往來形體消削咯吐瘀膿聲啞咽痛其候轉為肺痿如此者百死一生之病也用大栝蔞一個開一孔內子有多少粒數配杏仁去皮尖如數入栝蔞內將孔封好外用黃泥包裹煅紅無煙候冷去土將栝蔞又配川貝母如前數共研為細末用蜜調二錢臥時服燈心湯過口肺痿嗽唾寒熱氣急頰赤童尿五合大粉甘草寸許四破浸之露一夜平旦頓服一日一次肺癰咳嗽咳吐膿血胸中隱痛用薏苡仁略炒為末糯米飲調服或煮粥或水煎服當下膿血自安肺癰危急橘葉絞汁一盞服之吐出膿血即愈治肺癰奇驗方凡人肺癰初起時咳而兩胸即疼者是也即宜速服此方元參半斤天冬四兩桔梗二兩炙甘草一兩水十碗煎至二碗再用蒲公英五錢金銀花五錢再煎一碗飽食後服之初起者即消日久者即生肉奇方也肺風瘡金頭蜈蚣一條去頭足瓦上焙乾雄黃一錢硫黃一錢共研細末夏月用白茄子搗汁調搽冬月用柏油杵膏塗之臥塗於面次早洗去半月全愈肺風瘡驗過黑脂麻去皮蓮肉不去心水浸軟每早服之懸癰由於三陰虧損濕熱結聚而成此穴在於穀道之前陰器之後又為海底穴也初生狀如蓮子少癢多痛日久漸如桃李赤腫焮痛潰後輕則成漏重則瀝盡氣血變為癆瘵不起者多矣用大粉草四兩長流水浸透炭火上炙乾再浸再炙如此三度切片甘草三兩當歸身三兩水三碗慢火煎至稠膏去渣再煎稠厚為度每用三錢無灰熱酒一大杯化膏空心服之未成者即消已成者即潰既潰者即斂此懸癰良藥也囊癰凡小腹作痛牽引腎子多寒少熱好飲熱湯乃疝氣也如陰囊紅腫發熱小便赤澀內熱口乾墜重作痛乃囊癰之候不宜用疝家熱藥清肝滲濕湯主之川芎龍膽草天花粉當歸生地柴胡山梔黃芩各一錢澤瀉木通甘草各五分加燈心水煎食前服潰後糝藥蚌殼黃連青黛各等分研極細敷之囊癰抱出雞卵殼黃連輕粉等分為末以煉過麻油敷胎元七味丸方泰安太守薩公諱槎傳專治痔漏不拘遠年近日膿血通腸者服之化管除根此方異人傳授救人災難止人疼痛活人多矣只宜傳方施藥不可傳授匪人心存取利胎元三個即男子臍帶新瓦上焙乾存性陳棕七錢數十年者佳燒灰存性京牛黃三分槐角子五錢肥大者瓦上焙乾存性刺蝟皮三錢酥炙象皮四錢酥炙地榆三錢曬乾上七味共研細末酥油為丸如蠶子大若不成丸加糯米糊少許即成每服七丸空心白滾水送下三日化管止痛七日平滿血清膿止十日除根第一奇方洗痔回春方河邊柳根鬚一把白芥子花椒各二錢煎湯熏洗其蟲頭黑身白俱從瘡出立愈外敷藥方大黑棗三枚剖兩片去核入銅緑銜住外以淨紅土和泥包好煅紅取起去土研細真麻油調塗痔漏神效丸方江南錫山謝漢文楨氏傳當歸酒洗川連酒洗象牙末各五錢淨槐花小川芎酒洗滴乳香各二錢箬葉去油露蜂房一個槐樹上者佳椒樹上次之微火炒共研細末黃蠟二兩熔化入前藥末為丸桐子大每服五六十丸空心煎漏蘆湯送下至五日漏孔內退出肉管待二三指長用剪剪去再退出再剪之內管盡出自然從內生肌長肉愈矣神驗之極治疔瘡方菊花四兩甘草四錢水二大碗煎一碗服如疔瘡有紅絲者以燈心一根蘸油迎絲頭連燒十餘下並燒瘡頭皆燒至不疼又燒至復痛即止護心散見疔苗速用凡患瘍症見食噁心乃毒攻心也急服此散緑豆粉一兩乳香三錢去油每服五錢甘草水送下如心慌加硃砂三分酒調亦可治唇上身疔毒大腿彎中紫筋上銀針刺出血即愈治破傷風方鴿糞尖者炒一二錢白麥面炒一兩麻不拘分兩燒存性以上三味為末如遇破傷風腫得頭如斗大或垂死者用好黃酒調藥灌之即生屢驗治破傷風神方用手足十指甲香油炒黃為末黃酒沖服汗出即愈真奇方也破傷風病槐子一合炒黃好酒一碗煎八分熱服汗出為愈八寶丹專治一切魚口便毒頑瘡二三年不愈者服此如手取之效川大黃一兩香白芷獨活天南星製半夏天花粉各三錢大貝母穿山甲各五錢共研細末每藥一兩加粉霜三錢糯米濃汁為丸如鳳仙花子大硃砂為衣每服三分空心白滾湯送下一日一服即用柳根白皮熬水漱口十餘次不過十餘服即痊其毒從大便而出不吐不泄極為平和治魚口方東平展子明傳牛牙煅灰研細末每服一兩黃酒調送下一二服即愈治坐板瘡神驗方松香宮粉等分入蔥管內瓦上炙乾為末真麻油調塗一二次即愈神效無比坐板瘡方蜂殼燒灰存性研末和真冰片少許糝上一二次即愈治乾疥腫癢方俗名一掃把水銀輕粉潮腦各一錢大楓子肉十個杏仁一粒去皮尖蛇床子一錢共研細末以柏油燭油調勻先以肥皂水洗澡塗患處即愈鬢邊疽有數年不愈者用豬貓頭上毛各一撮燒灰用鼠糞一粒為末清油調塗立愈脅疽赤小豆末敷仍煮豆食飲汁骨疽不合骨從孔出掘地作坑口小里大深三尺以乾雞糞二升同艾及荊葉搗碎入坑內燒煙將疽就熏用衣擁之勿泄半日當有蟲出蛇纏丹毒糯米粉和鹽嚼塗之治赤白蛇纏瘡用㨮糞杓上竹箍燒灰研細用香油或麻油調搽患處即愈天蛇頭疔荔枝肉同麻油嚼敷禿瘡羊糞曬乾研細篩過用老鼠煎油調搽三次即愈且能生髮禿瘡屢驗方蕎麥麵一兩炒黃研細硫黃五錢研細共和勻或羊油或羊髓油亦可調勻搽之治牛皮癬效方牛膝三錢寒水石三錢白礬二錢飛過花椒一錢五分共為末以健豬油同雞蛋清調搽即愈牛皮癬瘡煙膏即硝牛皮刮下者藥鋪上買菜油調搽即愈治一切頑癬雞子四枚和香油蔥椒炒作餅子乘熱貼患處效治膿窠瘡神效方用最舊齷齪鞋一隻最舊年久絲綿絮筋二種俱燒成灰候冷再用大楓子肉為末合一處以香油調勻敷之兩日全愈如有未乾燥者以灰糝之其效如神甘露丸楊澤清傳治眼漏鼻漏耳漏牙漏肘漏腕漏乳漏胸漏臍漏大腸漏小腸漏臀漏膝漏踝漏或周身或一處不等及諸瘡年久不愈者悉能治之象牙末八錢飛白礬五錢大螞蜂窠二個帶子者刺蝟皮一張以上二味用新砂鍋焙黃色瓜兒血竭五錢硃砂六錢明雄黃七錢滴乳香三錢去油淨沒藥三錢去油淨兒茶四錢去油淨共研細末熔黃蠟為丸如桐子大每服二十四丸槐花煎湯沖黃酒空心送下藥內加白頸蚯蚓槐花更妙服藥後忌醋葷腥氣惱漏瘡人牙灰油發灰雄雞內金灰各等分為末麝香輕粉少許油調敷大麻風癩白色松香砂罐水煮干則添水煮化投水不澀為妙研末忌鐵器蜜丸桐子大每服七十丸加至百丸豬脬七個即尿胞也每個入蓮肉七粒煮極爛酒食之松節槐條桃條梅條側柏葉各數斤大鍋水煎出脂缸內先熏後洗一二時勿揩拭穿新青布衣蟲當出布衣上永不發矣忌大葷鹽兩月如手足𡰞攣加川烏草烏煎水洗風癩黃柏末皂莢刺灰各三錢研勻空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如肢腫用針刺出水再服忌一切魚肉發風之物癩風眉落生半夏末羊屎燒焦等分生薑自然汁調日塗治騎馬癰方金銀花八兩煎水二碗入大黃當歸各一兩牛膝三錢車前子生甘草地榆各五錢煎半碗空腹服後即臥睡醒病失矣過一日微瀉而愈神效奇方也須忌房事一月為要上疳方上疳者喉疳牙疳口瘡等症也百用百驗如神輕粉三分硃砂七釐半雄黃七釐半冰片二分定粉二分半共研細吹入口內無有不效者臨吹先用薄荷湯或茶漱過口爛膀瘡方生石膏研末極細和東丹桐油調搽三四次即愈雷頭風頭面疱瘩腫痛憎寒發熱狀傷寒用荷葉一片升麻蒼朮各五錢水煎溫服治搭手全蠍去毒三五枚核桃肉研末好酒沖服一二次即消臁瘡久害用蔥白健豬油去膜潮腦五六錢共搗極爛先用防風金銀花甘草煎湯淋洗患處按干後將前藥厚厚敷上用薄油紙裹好外用舊綿花扎緊一日兩換不可見風忌食發物數日生肌長肉全愈藥用瓷盒緊盛莫漏香氣此方又可治杖瘡並跌打皮肉損傷多年臁瘡方密雲縣牛欄山楊醫傳獸醫剷下驢蹄片不拘多少砂鍋炒黑存性研末脂麻油調搽患處如瘡濕者不必加油干敷之即愈此瘡百方不效者用此藥神效經驗治臁瘡不拘遠近神效方用舊爛牛皮鞋掌子取下砍碎陰陽瓦煅存性為末麻油調敷即愈神驗之極王府祕傳治楊梅瘡方用癩蝦蟆一個大者為佳紅眼者有毒不可用取時不可拿重恐走蟾酥宜用圓口小瓶一個置於地上緩緩趕其自進量能飲酒半斤者下酒一斤須折半斤可服其瓶口用木針針固仍以紙條封緊不可出氣慢火煨煎先將瓦瓶與酒共蝦蟆稱過斤兩若干煎折半可住火除去蝦蟆止取清酒溫服服後即將綿被覆暖取汗干方可起動更勿坐立當風處恐入風氣若上部瘡多略吃些粥服若下部瘡多空心服如一服未全愈停三四日再服一個決全妥矣且終身不發屢用屢效不可輕忽治黃水瘡羊鬚瘡屢驗方宮粉松香共研末燈盞油調塗之治漆瘡方石灰水調敷上一日除根流火神方夏枯草一斤水二十碗煎十碗放甏內熏痛處立止治小兒頭疽用有妻室的臥房門內地下腳踏處取土煅過用麻油調敷疽周圍留頂上如棋子大孔其膿血出即愈治小兒頭上熱癤方用𩽴魚尾貼上即不疼而愈奇效屢驗治濕痰流注神驗方用薑黃母子是大薑黃身上小釘子是也為末小紅棗去核藥末入內填平用絲綿扎緊塞入鼻孔內隨量飲醉蓋暖出汗已潰者自然愈未潰者內消神效之極鼻孔照男左女右塞之足瘡甲疽鹽湯洗煅緑礬研末厚敷甲疽膿血胬肉裹趾牡蠣揀厚處生研為末每服二錢紅花酒煎服仍用敷痄腮腫痛赤小豆浸軟杵末水調塗之即消塗背瘡神效治頭疼耳邊發腫太陽痄腮俱疼不可忍大黃一兩青木香薑黃檳榔各三錢以上為細末用醋蜜和調塗患處中留一孔氣干則易塗二三次即愈耳麵肥瘡馬齒莧為末和黃柏末敷之傷損門跌打損傷方四川提督軍門吳英言昔得祕方治跌打損傷極效雖重傷瀕死但有一絲之氣未絶者立蘇前任福建為副將時軍中有二辨相鬥皆致重傷其一則死矣馳往視之其一惟心頭氣尚微暖亟命以藥灌入覺胸間喀喀有聲不移時張目索食翌日遂能起行自後屢用屢著神效其方或於重陽日或於十一月採野菊花連枝葉陰乾每用菊花一兩加童便無灰酒各一碗同煎熱服跌打損傷氣絶不能言急以韭汁和童便飲一盞治跌打損傷昏迷不省人事此藥灌下立神效蘇木白麻皮細木耳以上各二錢俱用瓦上焙焦色木耳更要焦為妙共為末黃酒同黑糖調服服後將酒飲醉避風睡一宿即愈跌打及牆壁壓傷神驗方川麻一分木香二分紅花三分甘草四分研末黃酒送下均生用跌撲至重面青氣短欲死者宮粉一錢和水服之即安凡刀傷磕傷及爛入寸深者千年石灰輕粉血竭白蠟研末糝之外以隨便膏藥蓋上即愈金瘡或磕傷折傷血出不止疼痛難忍者蔥白砂糖等分研為泥封之其痛立止又無疤痕之妙金刀傷大興李振祖西平傳龍眼核剝淨外面光皮只用其仁搗研極細末填敷傷口即止西平氏云此藥在西秦及巴里坤軍營救愈多人龍眼核治金刃傷之功效驗查本草綱目及別集本草俱未細載可知世間有用之材自古迄今湮沒者不可勝計矣惜哉惜哉刀傷急治法用柿餅搗爛塗之血立止傷口自合打傷方白蠟一兩藤黃三錢入麻油溶化塗傷處立愈此方止痛止血及湯火傷皆妙猝墮壓倒打死心尚溫者將本人如僧打坐令一人持其頭髮稍放低用半夏末吹入鼻中醒後以生薑汁真麻油灌之再以干薄荷燒灰熱小便調下三錢日進三服自愈昔推官宋琢定驗兩處殺傷氣偶未絶急令保甲各取蔥白放鍋內炒熱遍敷傷處繼而呻吟再換蔥白敷之傷者無痛矣會以語樂平縣令鮑芹及再會鮑曰蔥白甚妙樂平人好鬥多傷每有殺傷公事未暇詰問先將蔥白敷傷處活人甚多箭鏃鉛彈傷干莧菜搗和砂糖塗之箭鏃鉛彈皆可出箭鏃入骨而不能出者鵝管石研細末撒在周圍箭頭自出箭鏃及針頭不出或在咽喉用螻蛄即濕地上夜鳴拉拉呼腦子搗泥敷上不過三五次即出墜車落馬筋骨痛不止元胡索末好酒服二錢日進二次即愈竹木刺入喉故鋸燒紅浸酒中乘熱飲之極妙接骨神方東平展子明方旱公牛角一個火上炙乾一層刮一層黃米麵不拘數蕎麵亦可榆樹皮白里不拘數花椒六七粒楊樹葉不拘數如無亦可共研細末以陳釅醋熬成稀糊用青布攤貼再用長薄柳木片纏住時刻聞骨內響聲不絶俟定即接如牛馬跌傷及樹株被風颳折者以此藥照治人法治之俱效雜治門猝暴惡死或縊死或臥奄然忽死心頭微微溫者蔥心黃莖男左女右入鼻孔三四寸鼻目出血有生急救方凡溺死者以鴨血灌之可活治水溺死用牛一頭或鐵鍋一口將溺者橫臥於上口中放箸一枝使水可出再以生老薑擦牙鴨血灌之即活治凍死方凡凍將死有氣者灰炒熱囊盛尉心胸冷即易灰若不先溫其心便以火烘則冷與火爭必死癲狗咬方斑蝥四個要頭足全木鱉二個麝香二釐黏米四十九粒炒熟上藥四味俱研細末開水送下即愈若服後小便疼痛即以涼水調服六一散三錢二三次以解斑蝥之毒其痛即止狗咬成瘡銀杏嚼細塗之惡蛇傷頓朴不可療者香白芷為末麥冬去心濃煎湯調下頃刻傷處出黃水待腫消皮合仍用此藥渣敷惡蛇咬傷青木香即馬兜鈴根水磨敷之仍煎湯飲吐妙救砒霜毒方會稽邵銘三先生傳無名異即土子漆匠用以煉桐油收水氣者研末吞下即活邵銘三云一人常稱無名異善解砒霜其友不信請面試先服砒霜後服無名異果無恙誤吞五金啖餳糖半斤其物皆從大便出小兒吞釘方活磁石一錢朴硝二錢並研為末以熬熟豬油加蜜和調藥末吞之將近一日自然解下蓋硝非磁石不能傳藥附釘磁石非硝不能逐釘速出非油無以潤非蜜則未必吞合是四者則著者著逐者逐潤者潤同功合力裹護而出矣解諸骨哽方或用艾葉煎酒服或將栗子內衣燒服或將虎骨研末服或將狗倒吊取涎服或將象牙末吹之解雞骨哽方或服水仙花根汁或服玉簪花根汁或將雞毛燒灰水服雞骨魚刺金鳳花子北名海南花炒為末吹入即出或下湯火傷凡湯火潑燒急覓水中大蚌置瓷盆中將其口向上無人處用水片三分真當門麝三分為細末俟大蚌口自開時以匙挑冰麝一二分傾入蚌口內其口即合而蚌內之肉悉化為漿然後再入冰麝少許用雞翎黏掃傷處先從四面邊層層掃入每日用一二枚痛處自減及其火氣已退將用下蚌殼燒灰存性研細末入冰麝少許從邊圍掃如無蚌處用冰片四面摩起漸及於中亦可漸瘥又杭粉為細末同婦人所用好頭油調塗如無柏子油亦可又用多年好陳醬寬寬塗之但愈後有黑癊湯火傷著人嚼生芝麻塗隨干止痛如患處寬大令衆人共嚼共塗之立愈湯火傷灼舊葫蘆瓢燒灰敷之煙燻欲死白蘿蔔生者嚼汁咽下立爽食物醋心胡桃嚼爛薑湯下立止貪食茶葉壁泥桴炭石灰生米等此症皆屬有蟲用炒芝麻一碟拌雄黃末三分始服白湯下三日後只吃炒芝麻服半月自愈女科門麥冬丸方治女子經閉形容枯槁屢驗杭州麥冬去心六斤熬成膏何首烏半斤黑豆拌九蒸九曬為末人乳浸不計遍數要曬得一斤重大懷熟地四兩紅花五錢酒洗當歸四兩酒洗鹿茸五錢酥炙共為末和勻入麥冬膏內再加煉蜜少許和為丸如梧子大每服三錢漸加至五錢黃酒滾水任下四制香附丸驗方香附一斤去毛酒製四兩童便制四兩薑汁製四兩鹽水制四兩各浸七日烏藥半斤炒共為細末用米麵米醋打糊為丸桐子大每服三錢澤蘭葉煎湯下肥人空心鹽酒送下如月水不調臨行三二日前腰痛用酒炒黃芩為引服之四十日大見功效妙不可述經閉乾血等症神方京師朝慶關僧建庵方雄雞一隻煮熟去肉取全骨一副即嘴爪俱要不遺再用童便生薑汁高醋各三鍾將骨入砂鍋或置新瓦上微火焙炒陸續將三汁灑在骨上仍留汁一小半將骨打碎又用香附米一兩同骨再焙仍將三汁陸續灑在骨上焙之俟骨酥脆去香附不用將骨研成細末分作三服黃酒調下一服汗出三服經行神效之極月水不斷陳蓮房燒存性研每服熱酒服二錢呂祖鸞筆傳治癥瘕屢驗方朝天結成石榴無些微損傷者連枝蒂摘下一枝用新砂鍋一個新木杓一柄多年黑色陳釅醋十斤愈久愈妙陸續入鍋煮榴用杓底擦滾石榴令其皮爛俟醋完熬至黑色如膠榴渣化盡如膏起鍋再預以羊血凝定如塊者盛瓷器中以金銀竹簪挑起一塊滴於血上即透至血底俱化為水足驗藥力如無羊血即豬血亦可驗陸續用酒化血不拘多少服之滾水化服亦可按石榴體沉其口多下垂者朝天者絶少此方異處再用石榴莫測其理癥瘕血塊勞疾屢驗多人方生川大黃切片一兩好陳醋浸曬各九次研極細末每服三錢好酒送下二三服即愈赤白帶下槿樹根皮二兩切以白酒一碗半煎一碗空心服白帶用紅酒甚妙赤白帶下無論老幼孕婦皆可服之馬齒莧搗爛擰汁三大合和雞子清二枚先溫令熱次下莧汁微溫頓飲之不過再服即愈血崩方雞冠子白者治紅崩紅者治白崩每服五錢焙微枯黃酒送下血崩久甚不愈真紫降真香三錢為細末水二鍾煎八分露至半夜雞鳴時熱服之出汗即愈崩中下血大薊根葉搗汁服半升血崩貫衆一味好黃酒一碗煎至半碗服至發汗立止無憂散治妊娠身居富貴口厭肥甘憂喜不常食物不節既飽便臥致令胞胎肥厚根蒂堅牢行動艱難因致臨産難生八月可服無憂散則易生矣當歸川芎白芍藥枳殼乳香各三錢木香甘草血餘即發灰以獖豬心血和之各一錢五分上為末每服二錢水煎日進二服世之難産往往見於鬱悶安佚之人富貴豢養之家若貧賤辛苦者未有也古方書止有瘦胎飲一論而其方湖陽公主作也實非極至之言何者見其有用此方者其難自若有妊婦苦於難産後遇胎孕則觸而去之豫甚憫焉視其形肥勤於針黹構思旬日忽自悟曰此正與湖陽公主相反彼奉養之人其氣必實耗其氣始和平故易産今形肥知其氣虛久坐知其不運必氣愈弱兒在胞胎因母氣不能自運耳當補其母氣則兒健易産生産保母子神方當歸酒洗川芎菟絲子各一錢五分川貝母一錢去心生黃耆八分川羌活甘草各五分白芍炒一錢二分冬月只用一錢枳殼麵炒六分荊芥穗八分蘄艾七分厚朴薑汁炒七分用水二鍾姜三片煎八分凡婦人受孕二三月者不論有病無病每月可服三兩劑臨月服三五劑臨産用三四劑同煎代茶不時飲自能平安易産諸病不生倘素日未知此方一時忽有血暈陰脫胎滑小産者服之即安又能橫生倒養六七日不下或嬰兒死於腹中者切忌收生婆用手只以此藥服之即下此係異人所傳神效無比豫家中用之多年真至寶也束胎丸懷妊七八月服之黃芩炒夏一兩春秋七錢半冬五錢白朮二兩白茯苓七錢陳皮三兩忌火為末粥丸梧桐子大每服三四十丸白湯下極妙佛手散治六七個月後因事跌磕傷胎或子死腹中疼痛不已口噤昏悶或心腹飽滿血上衝心者服之生胎即安死胎即下又治橫生倒産及産後腹痛發熱頭痛逐敗血生新血能除諸疾當歸五錢川芎三錢水七分酒三分同煎七分如橫生倒養子死腹中加黑馬料豆一合炒焦乘熱入水中加童便一半煎服少刻再服妊娠傷寒熱病護胎法方井底泥青黛伏龍肝即灶心土等分上為末攪勻塗於孕婦臍中二寸闊如干再塗上以保胎孕不傷孕婦癃閉涓滴赤色方小茴香陰陽瓦焙存性研末每服三錢黃酒沖服墜高跌打觸胎不安胎動腹痛縮砂仁不拘多少尉頭盛慢火炒熟透去皮為末每服二錢熟酒調下須臾胎動發熱即胎已安功最神效治胎動神驗奇方阿膠鵓鴿糞各三錢同炒為末白滾水送下即見紅亦安神驗無比生化湯産下即服全當歸酒洗八錢真川芎三錢姜灰五分夏令四分甘草炙五分桃仁十粒去皮尖研碎孕將臨月照方預備二劑俟一痛即用水二鍾先煎一劑渣另貯再煎一劑其渣同前渣並煎其汁三鍾和一處頓熱加黃酒六七匙於一産後未進飲食之前即行服下逐瘀生新永免産症或三兩日內精神疲倦或腹中作痛再連服二三劑即愈更治産後一切危症無不立安此方與達生湯均系張孟深先生所立救苦良方不論大小産皆可用奇效産後諸症總以生化湯為君余則不過隨症加減而已若惡露已行腹痛已止減去桃仁再多服數劑不妨如口渴加麥冬花粉寒痛加肉桂砂仁傷肉食加山楂傷飯食加麥芽傷果品加麵裹煨熟草果數分傷酸梅加吳茱萸三五分傷菱肉加生龜板傷梨及西瓜加肉桂之類如本元虛者少服開骨丹治産五七日不下及瘦小女子交骨不開死在旦夕龜殼自死者佳占卜者次之煮熟者不用女人發一握生男女者佳煅存性當歸酒洗川芎各一兩上為末每服三錢用水一盞半煎服約人行五里時胎即下治難産奇驗方生半夏白蘞等分為末每遇難産婦人或一二日夜不生急用此藥末一錢無灰酒送下不論橫生倒生胎衣不下俱只一服無不下矣神驗之極濟生湯治難産如神俟腰痛即服易産即三四日不生服此自然轉動生下此方催生第一穩效枳殼麵炒香附炒大腹皮薑汁洗炒各一錢當歸二錢五分川芎二錢甘草炙七分蘇葉八分水煎空心服産寶散伏龍肝乃柴灶下正中土也如子死腹中母亦將絶土三錢無根水調服即下其土當兒頭上戴出奇妙或胎衣不下用伏龍肝一兩為末好醋調納於臍中再用甘草煎湯三四合服之即出又臘月兔皮毛燒灰酒服即出治橫生難産子母雙全即時止痛順生驗方龜板一具去兩邊飛邊用高醋在火上掃炙十數次以板酥為度研細末每服三錢熱黃酒沖服難産簡便方效紅莧菜同馬齒莧煮熟食之即生婦人難産三四日不下者密將本夫陰毛剪下一半燒灰沖酒本夫手授與婦飲下即生切勿與婦知之屢驗婦人逆産釜臍煤以中指取下交劃兒足下即順胎衣不下效方雞蛋清二個去黃以好醋一鍾和之啜入口中即下胞衣不下將本婦之裩即褲也覆井上即下豬肝蜜酒法治婦人胞水早行胎澀不下豬肝一具白蜜四兩醇酒一升共煎至半升分作二三服不能服者隨其多少緩緩服之下死胎方用芒硝二錢童便溫調服立下子死腹中不出黃牛糞敷母臍即出産後中風危急屢驗方密雲縣牛欄山楊醫傳黑豆一茶鍾連須蔥五六半截先將黑豆焙至有煙時再入蔥黃酒一鍾水一鍾半共煎至一鍾服出汗即愈寶之寶之救人莫大陰功産後心痛此惡血不盡也用荷葉炒香為末每服方寸大匕沸湯或童便調下或燒灰煎汁皆可産後危急血暈惡露攻心將死方延胡索血竭真沒藥制淨歸身各等分醋水各半煎服即愈産後血暈韭菜不拘多少切入瓶中沃以熱醋令瓶嘴對鼻中即醒如無韭菜時用荊芥穗三錢炒黑研末童便送下産後小便不止厚肉桂一兩丁香三錢為末酒調作餅放臍上即止治産婦大便不通及老人諸虛人風祕不通難行導藥者服此最妙最穩效若影響蘇子胡麻子各半合研極細用水再研取汁一碗煮粥食之解下結糞漸得通利極驗湧泉散治産母乳汁不通王不留行天花粉甘草各三錢當歸二錢穿山甲炙黃一錢五分共為細末每服三錢豬蹄湯或熱黃酒送下其乳自湧泉矣通脈散治乳少或無乳黃耆生用一兩當歸五錢白芷五錢七孔豬蹄一對煮湯吹去浮油煎藥一大碗服之覆面睡即有乳或未效再一服無不通矣新産無乳者不用豬蹄只用水一半酒一半煎服體壯者加好紅花三分以消惡露無乳牛鼻子作羹食之乳下無限乳吹乳滯方蒲公英一兩入無灰酒一斤煎熟服神效結乳敷藥方一婦患此症諸藥不效腫痛異常以此方治之立效右院判汝敬吳公傳用生山藥不拘多少搗爛敷之吹乳仙方蔥一大把搗成餅一指厚攤乳上用灰火一罐覆蔥須臾汗出腫痛立消結乳方蚯蚓糞以陳醋調塗患處即愈小兒門治初生小兒無皮但赤色紅筋乃母氣不充實受胎未足也早稻米粉撲之肌膚自生神效治小兒初生大小便不通急令婦人以熱水漱口吸小兒前後心及臍下數次即通小兒不尿胎熱也大蔥白一莖切四片乳汁煎頃刻作四服小兒大小便血乃熱傳心肺不宜涼藥以生地黃汁五七匙酒半匙蜜半匙和服小兒目閉或出血或腫澀此慢肝風也以豬膽汁塗甘草炙之研末乳服小兒龜胸龜背取龜尿摩其胸背久久即瘥法取龜置瓦盆中以鏡照之即失尿急以物收之或以豬鬃刺其鼻即尿小兒臍瘡馬齒莧燒研敷之小兒臍風鎖口烏梅煎湯灌之即愈治初生小兒月內臍風神驗方如發臍風看小兒臍上定起有青筋一條自臍而上指心口若此筋已至心口十難救一二矣看此筋未至心口時用艾莊在此青筋頭上灸之此筋即時縮下寸許再從縮下筋頭上灸之此筋即消病愈屢試屢驗蓐瘡凡小兒百日內生瘡名蓐瘡由胎毒所致又名毒瘡從身漸延至頭齊眉癩遍則愈若從頭漸至腹者難治內服犀角丸牛黃犀角羚羊角全蠍酒洗殭蠶炒防風羌活天麻黃麻膽星天竺黃黃連京墨煅微煙為度以上各三錢為細末蒸餅打糊為丸芡實大硃砂金箔為衣每服一丸薄荷湯下如外敷藥恐毒入內反生他疾宜用藥煮布衫穿之以青布做小衣二件同藥煮陰乾早晚換服再煮以愈為度煮衣之藥四味大黃八兩甘草四兩當歸二兩朴硝二兩乳母宜服煎藥十劑苦參二錢羌活八分甘草四分連翹防風荊芥牛蒡子研金銀花各一錢水煎服忌食雞鵝羊魚韭蔥蒜等酒宜少吃小兒齁喘活鯽魚七個以兒自尿養器中待紅煨熟食走馬牙疳言患迅速不可遲延故也多屬痘疹餘毒所中又有雜病熱甚而成者其患牙齦腫爛隨便黑腐作臭有五種不治口臭延穢不治黑腐不脫不治牙落無血不治穿腮破唇不治用藥不效不治初起人中白溺壺者佳煅紅二兩兒茶一兩黃柏薄荷青黛各末六錢冰片五分研極細先用溫湯漱淨吹藥疳上日用六七次吹藥後涎從外流為吉涎毒內收為凶內服蘆薈銀柴胡胡黃連川黃連牛蒡子元參桔梗山梔石膏薄荷羚羊角各五分甘草升麻各三分水二鍾淡竹葉十片煎六分食後服此方雖穿腮破唇並宜服之小兒口疳人中白煅黃柏蜜炙焦為末等分入冰片少許青布拭淨摻之疳症仙方治一切肚黃瘦腹痛蟲積神效雄黃三錢麝香五分膽星二錢全蠍大炒去足殭蠶各一錢炒巴豆五分紙打去油共稱淨末神麯糊丸如菜子大硃砂飛二錢為衣每服一錢白湯下杭州智榮和尚得此方濟人千萬矣小兒口瘡不能吮乳密陀僧末醋調塗足心愈即洗去小兒胎剝兩大腿近小腹處生瘡皮脫開漸延小腹則不救此名胎剝用豬膽抹黃柏炙研塗之或加伏龍肝末等分唾濕患處摻之嬰兒胎瘡滿頭者用水邊烏桖樹根曬研入雄黃末少許生油調搽小兒赤遊風方丹行於上下至心即死白菜搗敷即止小兒浮腫絲瓜燈草蔥白等分煎汁浴之並少飲小兒咳嗽咳嘔不已麻黃防風荊芥各三錢為末緑豆麵五錢研勻杏仁三錢煎湯調前藥每服一錢上下量兒大小服小兒泄利血痢馬齒莧搗汁一合蜜二匙空心煎服小兒痢疾雞子一個煮二三沸取起去白用黃研碎以生薑汁半小鐘和勻與小兒服之不宜吃茶其效如神小兒疳痢疳痢垂死新羊屎一升水一升浸一夜次早絞汁頓服日午乃食極重者三服愈小兒冷疳腹大吐食麵黃腿縮母丁香七枚為末乳汁和蒸三次薑湯服針砂丸治小兒面黃腹大積聚不消不思飲食針砂四兩醋煅七次皂礬四兩火煅厚朴一兩薑汁炒青皮一兩三稜一兩陳皮一兩草烏一兩南木香一兩雄黃一兩檳榔一兩使君子一兩鱉魚腳八隻醋浸焙乾上醋為丸如粟米大空心調服小兒一歲三分治急驚神方用燈心二十根長五六寸蟬蛻七個去頭足翅蓋只用肚皮明殼上好辰砂三錢以新白砂扎緊用線系物墜於砂罐兩邊懸空放水中量小兒大小或用水鍾半煎一鍾或用水一鍾煎七分服下即愈小兒驚癇腹滿大便青白柏子仁末溫酒調服一錢小兒驚風方麝香半分硃砂二分烏梅一個去核共研碎用親人血即人乳數點再用鉤藤煎湯與小兒食之驚風立愈小兒寒熱驚癇驚榴發熱用荊芥柴燒瀝一鍾入薑汁二匙消痰如神小兒寒熱驚癇驚癇嚼舌迷昏仰目牛黃一豆許研和蜜水灌之小兒痰熱方亂髮同雞子黃熬良久出油與兒服之治小兒不出痘祕方羌活防風升麻麻黃生地黃柏各五分歸身黃連甘草各三分柴胡乾葛藁本川芎黃芩酒炒蒼朮各二分細辛白朮陳皮蘇木紅花各一分連翹吳茱萸各半分以上藥合為一劑每逢立春立夏立秋立冬之前一日晚用水二鍾煎八分露一夜如遇下雨露在檐下次早溫服於一年之內只服四劑永不出痘即服一二劑出痘一少服過四劑再不必服但小兒服藥若瀉乃胎毒去也逢第二次服則不瀉矣亦有初次不瀉者是胎毒輕也同志者若刊刻廣傳甚妙稀痘神方孕婦懷孕時用生白芝麻五升或一二升置於常出入處孕婦隨便食十個月生後小兒不受胎毒無痘可出即出亦稀而無害此江南薛浩然屢驗之方豆丹赤豆黑豆緑豆各一撮甘草節五分不時煎服屢驗如鄉鄰有痘疹流行預與兒食可免不出即出亦輕治痘癢搔破用蓋屋爛草二三年者曬極干研篩極細末摻於患處如遍身損濕不堪坐臥者可用二三升攤於席上令兒坐臥效應如神解痘毒方生螃蟹飛羅面搗膏貼患處立愈小兒痘花倒陷痘花倒陷毒遏便血昏睡諸惡症用抱出雞子殼去膜新瓦焙研每熱湯調服半錢嬰兒以酒調抹唇上並塗胸背及風池穴更效小兒痘極多不能灌漿丹方用白水牛身上蝨二三錢新瓦焙乾龍眼湯送下此方妙不可言服後亦不灌漿只起黑衣而愈其蝨在牛耳中取之治痘疹黑陷不起用狗蠅七個擂碎和好酒釀調服即愈小兒痘後癰毒赤小豆末雞子清調塗治痘風眼效方吳江啓孫吳先生傳荊芥穗蒼耳子遼細辛薄荷葉炒去刺淨防風煎好傾入小瓷瓶內對眼先熏再傾出洗之洗後用神佛前燈架上滴下桖油燭淚搽之效小兒溏泄柿餅燒熱食之即止小兒頭上肥瘡方編筐灰之葛條煅灰燈窩油調塗之治腹內蟲疼方烏梅一個老薑三片棐子十個花椒十四粒黑糖少許煎服蟲盡出矣鸞批竟加十倍照方為末用糖拌每晨用二錢兒大至三五錢蓋煎劑其功太緩小兒誤將竹木刺入眼內白頭頸蚯蚓掐斷滴血入眼刺即出新增回生集續補經驗良方洗眼方用皮硝五錢清水一碗半煎七分每月一日三洗辰時向東方午時向南方戌時向西方用黑綢頻洗此日必須潔淨持齊不可亂洗即有效驗日期開後閏月照前正月初三二月初四三月初三四月初五五月初五六月初四七月初二八月初九九月初十十月初三十一月初四十二月初四四物湯治血虛發熱或因克伐潰後失血以致煩躁不安當歸熟地各二錢白芍一錢川芎一錢五分上水煎服安胎催生神授祕方凡妊娠八個月後預服一劑臨盆服一二劑能免一切難産又一切胎動能安其分兩俱屬神授不可以意加減當歸身酒洗川芎各一錢五分菟絲子一錢五分白芍酒炒冬月一錢余月一錢二分川貝母一錢浙貝不可用荊芥穗炒黃耆蜜炒各八分厚朴姜炒蘄艾葉各七分枳殼炒六分羌活甘草各五分姜三片空心服經驗催生神效方茶陵談繼善堂刊北耆錢半酒炒氣虛者用二錢川貝母另研沖服酒芍一錢當歸二錢川芎錢半菟絲子錢半川厚朴薑汁炒荊芥艾茸羌活各八分枳殼六分甘草五分生薑引此方得自醫學心悟屢試屢驗隨手見功凡難産者服之立産不當産者服之即安洵救急之良方濟生之寶筏焉但勿任意增減為囑産後血氣痛方楂肉炒黑三分煎水紅糖兌服又方元胡索六錢酒炒丹參三錢枳殼一錢煎服腎氣痛方川楝十粒用巴豆七粒同煮去巴豆瓦上焙枯成炭荔枝核十粒打碎鹽水炒枯吳萸二錢小茴三錢官桂三錢均用鹽水炒同前藥研末白滾水沖服治瘋犬咬神方青黛一兩千年矮連根一握將千年矮煎濃汁沖兌青黛一大碗服不過二三劑全愈並不禁忌此方系姜若鵬祖傳屢試屢驗按千年矮一名路邊精五六七月開小白花其根入火爐中燒之作貓屎臭者是故俗名貓屎它治瘋犬傷馬牛羊方用紫竹根入鐵鎖一把同煎牛馬灌犬羊拌食及草服之愈中菌毒神方雞毛水服之愈隨食其雞肉妙清平丸此藥性味平和而功用甚大統治一切天行四時瘟疫彼此傳染憎寒壯熱精神昏迷身體倦怠骨節疼痛飲食不進胸腹臌脹炎天受暑痧症霍亂吐瀉春瘟夏瘧秋痢感冒風寒山嵐瘴氣諸病每用二丸開水化服重者四五丸無不應效如噤口痢疾飲水入口即吐者用一丸噙化徐徐咽下開通胃氣即能飲食虔治與人應手取效茲將藥方開後惟願仁人君子好善樂施配合廣濟俾窮檐蔀屋無力延醫者感得賴以治療篤疾檳榔一斤川厚朴薑汁炒廣皮各十二兩藿香六兩制香附半斤炒枳實半斤酒白芍半斤半夏曲十二兩紫蘇六兩草果仁半斤製蒼朮十二兩青皮半斤柴胡半斤炒黃芩半斤萊蔔子四兩炒煨乾葛六兩山楂肉半斤甘草四兩外加陳神麯三斤武彝茶四兩共研細末用生薑十斤搗取自然汁將紅棗打泥泡濃汁拌水泛為丸每丸重一錢五分曬乾透用大瓶盛貯勿泄氣小兒減半孕婦忌服治實火喉症蛾子用生梅子一升蜒蛔蟲不拘多少此蟲俗名滑泥涎其蟲涎滑滿身同裝入壇內日久蟲化成水梅子自干收貯如遇此症用梅子一枚噙之即愈又方用青果核不拘多少燒灰存性每錢加上冰片五釐研極細末吹之亦效併兼治爛腳不收口者火湯傷方用生貫衆十斤以大為妙切碎炒燥研細末篩過再以童便浸透曬乾再浸再曬如此三五次曬乾收貯用時將生桐油調敷如此起泡出水即干𭣅之即愈此藥須在伏天制好胎前奇方全當歸菟絲子酒泡曬淨真川芎各一錢半川羌活細甘草各五分厚朴薑汁炒蘄艾醋炒各七分生黃耆芥穗各八分枳殼六分去瓤麩炒白芍酒炒一錢二分川貝母八分上味加生薑三片空心服未産者能安臨産者隨時服或傷胎氣腰痛腹痛血下勢欲小産危急一服即愈再服全安或正産交骨不開橫生逆下或六七日不産或死於腹中此藥立刻即下保全母命産後奇方熟地四錢麥冬去心微炒白朮土炒黃杜仲姜炒牛膝各二錢茯苓續斷白芍酒炒各一錢五分益母草八分薑炭六分存性建蓮子十粒去心燈草十根上味食前溫服産後一月之內不拘寒熱血瘀頭眩腹痛昏憒不語咳嗽氣喘吐瀉痢疾風惡等症服之立效以上二方皆系異人所授傳治多人勿妄加減誤人身命縮陰救急方用蔥一大把刀截去兩頭置肚臍上再用錫提壺盛開水蕩蔥上數次暖氣達肚內即愈取牙方活雄鯽魚一尾約四五兩重白砒六錢將砒末入魚腹中待其肉爛去砒不用只用淨魚骨曬乾為細末每用如米大少許放焦牙根上自落治手上紅絲疔方手足間有黃泡即起紅絲一條走入心腹令人悶亂不救皆因大喜大怒氣血逆行所致急用針於紅絲所到之處刺之擠出惡血再細嚼浮萍草根敷之即愈解百毒方生粉甘草二兩緑豆一升水煎服立效又方凡覺腹中不快即以生黃豆試之入口不聞腥氣此真中毒也急以升麻煎汁連連飲之將手探吐自愈或嚼生礬一塊覺甜而不澀者是毒否則非也治吞針方名吸針丸用透活磁石生研將黃蠟和捻如針涼水送下磁石裹針從大便出誤吞銅錢方胡桃肉四兩荸薺一斤共搗汁和酒服其錢即從大便中出治腳趾縫爛方鮮黃皮鵝掌陰乾燒灰存性為末摻之即愈又方用上好黃丹一味摻二三次即愈又方用陳松蘿茶末摻之愈治跌打損傷軍中刀箭傷第一仙方生狗頭骨將肉刮盡露一天火煅存性為末人指甲灰血餘灰各二錢陳松香五錢共研極細末摻傷患處骨斷即續刀傷即愈以上四味等分將酒兌服亦可洗方北防風荊芥共煎湯宜避風處洗接骨方將糞窖內多年瓦片洗淨醋煅九次研末每兩加五加皮男子發灰各五錢好醋調敷每次一分酒送下再用竹片將竹青向內撥定焦處勿動若破皮者勿用摻藥桃花散治跌打刀傷狗咬爛腳等症年久風化石灰十升炒至桃花色存性錦紋大黃一兩焙脆研末將真麻油調敷當日敷更妙治陰囊腎子腫大灶心土三升砂鍋內炒熱加川椒小茴末各一兩拌勻將陰囊坐在上面冷則再換如此三次即愈治陰子腫大不消方頂大荔枝核十二三個煅灰存性以火酒調如糊吃下即消重者再服治心頭痛欲死不可忍者方良薑厚朴薑汁炒靈脂各等分為末每服一錢醋湯下即止治心痛方婦人服之甚效丹砂一兩檀香一錢砂仁一錢共煎八分服之即愈又方香附一兩醋炒良薑五錢酒炒共為細末滾水沖服補脾養胃方名陽春白雪糕雲苓淮藥炒芡實蓮肉去心各四兩糯米炒黃米炒各半升白糖先將藥米粉蒸熟再入白糖印成餅子曬乾每日空心服接骨膏治跌打撲傷骨斷筋翻者神效威靈仙二兩上厥粉八兩先將粉炒糊後入靈仙和炒至黑色用陳醋調敷氣痛方蔻仁三奈炕幹不可炒小茴神麯各依等分共為細末每服一錢燒酒送下反胃方用韭菜地內紅蚯蚓隔水煮三炷香收湯服即進飲食立止牙痛白芷一錢赤芍一錢五倍子一大個挖一孔將食鹽灌滿倍子用紙包數層透濕火煅過為末合藥隨用臁瘡方用柿葉燒灰存性再用川椒為末搽患處神效疔瘡方用家園菊取汁一碗服下即愈如無花時取根苗亦可治耳內流膿腫痛用番木鱉磨水滴入耳內即愈治小兒口角流涎潰爛用羊皮剝下羊毛不用拔去毛燒灰搽上即愈治婦人吹乳水藥方當歸蒲公英管仲天葵乳沒絲瓜穰風凰衣甘草上味等分水炆酒兌內吹加臭椿皮黃豆外吹去椿皮加野葡萄根敷藥蓮蓬殼燒灰存性制甘石上冰片黃丹角霜共為細末麻油調搽治癬藥神方銅緑一兩食鹽三錢用雞蛋油調搽
