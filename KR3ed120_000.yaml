body:
  text: 回生集原敘從來妙劑多出仙傳如千金等方其尤著者也余素患痰疾後又左膝寒痛二十載以來屢治不瘥戊申歲恭設乩壇求治於葛仙翁祖師乩示云此膝痛即系積痰所致幸賜方藥宿疾頓除嗣凡眷屬有恙即虔禱仙方無不立效但祖師因人治病故所得乩方未敢廣傳惟立願遍訪世間經驗良方無論已刻未刻彙刊公世尚恐成方中或有一時偶驗未可永為準則者謹求祖師選定得四百餘方並蒙乩批云豫有一片濟世之心故凡有所求借乩鸞以示爾今備有成方請豫選定豫亦欣然但病有虛實寒熱藥有溫涼補伐虛宜溫補實宜瀉散倘視症未明誤投藥劑為害非輕今擇其必中者用之自無不驗也此書即定為回生集可耳敬敘卷首以體祖師普濟之慈心云乾隆己酉歲孟夏月中浣古北樂天叟陳杰書於云間篤忠堂官舍重刻回生集敘丁酉鄉試寓南陽街適周採軒重刻陳樂天叟回生集採軒以余粗知藥性問序於余余取其原敘讀之殆所謂神道設教者也其間可取者經驗二字濟世二字而已顧余讀御纂醫宗金鑑有所謂補心丹者冠以天王二字有所云活命飲者冠以仙方二字則原序所云祖師選定亦何可盡斥為荒唐之説哉大抵醫者意也四字誤人不小論語云毋意大學云誠意意之一字公私是非邪正在反掌間業醫者必虛心體貼四診心法凡望色聞聲問證切脈能如孟子所云説詩以意逆志斯於意也一言為無弊耳學醫者誠得所以用意之説而又採成方以為主治之準則經驗者無不驗濟世者無不濟然則採軒此書出積善多矣採軒得此書於蘇吳舶中有志刊送垂二十年今始商之同人得如初願尤望橐有餘資者廣為印送俾家藏一册人手一編雖鄉居僻壤地鮮名醫皆可按症求方而不求人東陵真陽子春謹敘
